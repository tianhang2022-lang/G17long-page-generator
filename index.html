<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 长图生成器</title>
<script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei',sans-serif;font-size:13px;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;border:none;outline:none;font-family:inherit;font-size:12px}
input,select,textarea{font-family:inherit;font-size:12px;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1a1a2e}
::-webkit-scrollbar-thumb{background:#444;border-radius:3px}

/* ===== TOOLBAR ===== */
#toolbar{height:48px;background:#16213e;border-bottom:1px solid #0f3460;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:100}
#toolbar .logo{font-size:16px;font-weight:bold;color:#e94560;margin-right:8px;white-space:nowrap}
#toolbar .sep{width:1px;height:28px;background:#0f3460;margin:0 4px}
.tb-btn{background:#0f3460;color:#c0c8e0;border:1px solid #1a4a80;border-radius:4px;padding:5px 10px;transition:all .15s}
.tb-btn:hover{background:#1a4a80;color:#fff}
.tb-btn.active{background:#e94560;border-color:#e94560;color:#fff}
.tb-btn-group{display:flex;gap:2px}
.tb-btn-group .tb-btn{border-radius:0}
.tb-btn-group .tb-btn:first-child{border-radius:4px 0 0 4px}
.tb-btn-group .tb-btn:last-child{border-radius:0 4px 4px 0}
.tb-btn.danger{background:#3a1a1a;border-color:#a03030;color:#ff6666}
.tb-btn.danger:hover{background:#a03030;color:#fff}
.tb-btn.export{background:#1a3a1a;border-color:#2a7a2a;color:#88ff88}
.tb-btn.export:hover{background:#2a7a2a;color:#fff}
.tb-btn:disabled{opacity:0.35;cursor:not-allowed}
.tb-btn:disabled:hover{background:#0f3460;color:#c0c8e0}
#toolbar .spacer{flex:1}

/* ===== MAIN LAYOUT ===== */
#main{display:flex;flex:1;overflow:hidden}

/* ===== LEFT PANEL ===== */
#left-panel{width:260px;min-width:260px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden}
.panel-tabs{display:flex;border-bottom:1px solid #0f3460;flex-shrink:0}
.panel-tab{flex:1;padding:8px;text-align:center;cursor:pointer;color:#888;transition:all .15s;font-size:12px}
.panel-tab.active{color:#e94560;border-bottom:2px solid #e94560;background:#0f2040}
.panel-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px}

/* Module list */
.module-card{background:#0f2040;border:1px solid #1a4a80;border-radius:6px;padding:8px;margin-bottom:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;user-select:none}
.module-card:hover{border-color:#4a8af0}
.module-card.selected{border-color:#e94560;background:#1a1040}
.module-card .mod-num{background:#0f3460;color:#4a8af0;border-radius:3px;padding:2px 5px;font-size:11px;flex-shrink:0}
.module-card .mod-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px}
.module-card .mod-actions{display:flex;gap:3px;flex-shrink:0}
.mod-btn{background:#1a3060;color:#aaa;border-radius:3px;padding:3px 6px;font-size:11px;transition:all .15s}
.mod-btn:hover{background:#e94560;color:#fff}
.add-module-btn{width:100%;padding:8px;background:#0f3460;color:#4a8af0;border:1px dashed #2a6aaa;border-radius:6px;margin-bottom:8px;transition:all .15s;font-size:13px}
.add-module-btn:hover{background:#1a4a80;color:#fff;border-style:solid}

/* Asset library */
.asset-cat-tabs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.asset-cat-tab{padding:3px 7px;background:#0f3460;color:#888;border-radius:3px;cursor:pointer;font-size:11px;border:1px solid #1a4080}
.asset-cat-tab.active{background:#e94560;color:#fff;border-color:#e94560}

.asset-group-card{background:#0f2040;border:1px solid #1a4a80;border-radius:6px;padding:6px;margin-bottom:6px}
.asset-group-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.asset-group-name{flex:1;background:#0a1830;color:#c0c8e0;border:1px solid #2a4a70;border-radius:3px;padding:3px 6px;font-size:11px;width:100%}
.asset-group-del{background:#3a1a1a;color:#ff6666;border-radius:3px;padding:3px 6px;font-size:11px}
.asset-group-del:hover{background:#a03030;color:#fff}
.asset-three-slots{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:4px}
.asset-slot{background:#0a1830;border:1px dashed #2a4a70;border-radius:4px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:all .15s}
.asset-slot:hover{border-color:#4a8af0}
.asset-slot img{width:100%;height:100%;object-fit:cover;border-radius:3px}
.asset-slot .slot-label{font-size:10px;color:#666;margin-top:3px;position:absolute;bottom:2px;left:0;right:0;text-align:center;background:rgba(0,0,0,.6);padding:1px}
.asset-slot .slot-del{position:absolute;top:1px;right:1px;background:rgba(160,0,0,.8);color:#fff;border-radius:2px;padding:0 3px;font-size:10px;display:none}
.asset-slot:hover .slot-del{display:block}
.asset-single-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.asset-single-item{background:#0a1830;border:1px solid #1a4a80;border-radius:4px;padding:4px;cursor:pointer;position:relative}
.asset-single-item img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:3px}
.asset-single-item .item-name{font-size:10px;color:#aaa;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-single-item .item-del{position:absolute;top:2px;right:2px;background:rgba(160,0,0,.8);color:#fff;border-radius:2px;padding:0 4px;font-size:10px;display:none}
.asset-single-item:hover .item-del{display:block}
.upload-single-btn{width:100%;padding:6px;background:#0f2040;color:#4a8af0;border:1px dashed #2a6aaa;border-radius:4px;margin-top:6px;font-size:11px}
.upload-single-btn:hover{background:#1a4a80;color:#fff}
.add-group-btn{width:100%;padding:6px;background:#0f2040;color:#4a8af0;border:1px dashed #2a6aaa;border-radius:4px;margin-bottom:6px;font-size:11px}
.add-group-btn:hover{background:#1a4a80;color:#fff}

/* ===== CENTER CANVAS ===== */
#canvas-area{flex:1;overflow:auto;background:#0a0a18;background-image:radial-gradient(circle,#1a2a40 1px,transparent 1px);background-size:20px 20px;display:flex;justify-content:center;align-items:flex-start;padding:30px 20px}
#canvas-inner{position:relative;transform-origin:top center;flex-shrink:0}
#main-canvas{display:block;cursor:default}
#overlay-canvas{position:absolute;top:0;left:0;pointer-events:none;cursor:default}
#overlay-canvas.interactive{pointer-events:auto}
#slice-overlay{position:absolute;top:0;left:0;width:100%;pointer-events:none}
.slice-line{position:absolute;left:0;right:0;height:2px;background:rgba(255,80,80,.8);cursor:ns-resize;pointer-events:auto}
.slice-line::before{content:attr(data-y);position:absolute;right:4px;top:-16px;background:rgba(255,80,80,.8);color:#fff;font-size:10px;padding:1px 4px;border-radius:2px}

/* ===== RIGHT PANEL ===== */
#right-panel{width:280px;min-width:280px;background:#16213e;border-left:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden}
#props-panel{flex:1;overflow-y:auto;padding:8px}
.props-title{font-size:13px;font-weight:bold;color:#e94560;padding:6px 0 8px;border-bottom:1px solid #0f3460;margin-bottom:8px}
.props-section{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #0f3460}
.props-section:last-child{border-bottom:none}
.section-title{font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.props-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.props-label{color:#aaa;font-size:11px;white-space:nowrap;min-width:36px}
.props-input{background:#0a1830;color:#c0c8e0;border:1px solid #2a4a70;border-radius:3px;padding:3px 6px;width:100%}
.props-input:focus{border-color:#4a8af0}
.props-num{background:#0a1830;color:#c0c8e0;border:1px solid #2a4a70;border-radius:3px;padding:3px 4px;width:60px;text-align:center}
.step-btn{background:#1a3060;color:#aaa;border-radius:3px;padding:2px 6px;font-size:12px;line-height:1.2;flex-shrink:0}
.step-btn:hover{background:#2a5090;color:#fff}
.props-textarea{background:#0a1830;color:#c0c8e0;border:1px solid #2a4a70;border-radius:3px;padding:4px 6px;width:100%;resize:vertical;min-height:60px;line-height:1.5}
.props-textarea:focus{border-color:#4a8af0}
.props-select{background:#0a1830;color:#c0c8e0;border:1px solid #2a4a70;border-radius:3px;padding:3px 6px;width:100%}
.props-color{background:#0a1830;border:1px solid #2a4a70;border-radius:3px;padding:1px;height:26px;width:40px;cursor:pointer}
.btn-group-3{display:flex;gap:2px}
.btn-group-3 button{flex:1;padding:4px;background:#0f3060;color:#888;border-radius:3px;border:1px solid #1a4080;transition:all .15s}
.btn-group-3 button.active{background:#4a8af0;color:#fff;border-color:#4a8af0}
.btn-group-4{display:flex;gap:2px}
.btn-group-4 button{flex:1;padding:4px 2px;background:#0a1830;color:#667;border:1px solid #0f3060;border-radius:3px;font-size:11px;cursor:pointer;transition:all .15s}
.btn-group-4 button:hover{color:#c0c8e0;border-color:#2a5090}
.btn-group-4 button.active{background:#0f3460;color:#4a8af0;border-color:#4a8af0}
.props-check{display:flex;align-items:center;gap:4px;cursor:pointer}
.props-check input{width:14px;height:14px;cursor:pointer}
.props-slider{width:100%;accent-color:#4a8af0}
.align-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
.align-btn{padding:5px;background:#0f3060;color:#aaa;border-radius:3px;border:1px solid #1a4080;font-size:14px;transition:all .15s}
.align-btn:hover{background:#4a8af0;color:#fff}
.layer-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.layer-btn{padding:5px 2px;background:#0f3060;color:#aaa;border-radius:3px;border:1px solid #1a4080;font-size:10px;transition:all .15s}
.layer-btn:hover{background:#2a5090;color:#fff}
.margin-presets{display:flex;flex-wrap:wrap;gap:3px}
.margin-preset-btn{padding:3px 7px;background:#0f3060;color:#aaa;border-radius:3px;border:1px solid #1a4080;font-size:11px}
.margin-preset-btn:hover{background:#2a5090;color:#fff}
.no-select-hint{color:#555;text-align:center;padding:40px 16px;font-size:13px;line-height:2}
.asset-pick-row{display:flex;gap:4px;align-items:center;margin-bottom:5px}
.asset-pick-preview{display:flex;gap:2px}
.asset-pick-preview img{width:28px;height:28px;object-fit:cover;border-radius:3px;border:1px solid #2a4a70}
.asset-pick-btn{flex:1;padding:4px 8px;background:#0f3060;color:#4a8af0;border:1px dashed #2a6aaa;border-radius:4px;font-size:11px}
.asset-pick-btn:hover{background:#1a4a80;color:#fff}

/* bg type toggle */
.bg-type-btns{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:8px}
.bg-type-btn{padding:4px 8px;background:#0f3060;color:#888;border-radius:3px;border:1px solid #1a4080;font-size:11px}
.bg-type-btn.active{background:#4a8af0;color:#fff;border-color:#4a8af0}

/* ===== MODAL ===== */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-backdrop.hidden{display:none}
.modal{background:#16213e;border:1px solid #0f3460;border-radius:8px;padding:16px;max-height:85vh;overflow-y:auto;min-width:400px;max-width:90vw}
.modal-title{font-size:15px;font-weight:bold;color:#e94560;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;color:#888;font-size:18px;padding:0 4px}
.modal-close:hover{color:#fff}

/* Template grid */
.template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.template-card{background:#0f2040;border:1px solid #1a4a80;border-radius:6px;padding:10px;cursor:pointer;transition:all .15s;text-align:center}
.template-card:hover{border-color:#e94560;background:#1a1040}
.template-card svg{width:80px;height:60px;margin-bottom:6px}
.template-card .tpl-name{font-size:12px;color:#c0c8e0}
.template-card .tpl-desc{font-size:10px;color:#666;margin-top:2px}

/* Asset picker modal */
.asset-picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.asset-picker-item{background:#0f2040;border:2px solid #1a4a80;border-radius:6px;padding:6px;cursor:pointer;transition:all .15s;text-align:center}
.asset-picker-item:hover{border-color:#4a8af0}
.asset-picker-item.selected{border-color:#e94560}
.asset-picker-item .picker-previews{display:flex;gap:2px;margin-bottom:4px}
.asset-picker-item .picker-previews img{flex:1;height:36px;object-fit:cover;border-radius:2px}
.asset-picker-item .picker-name{font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.asset-picker-single img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:3px;margin-bottom:4px}

/* Slice mode */
#slice-mode-bar{background:#1a1000;border-bottom:1px solid #3a2000;padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#ffaa44;flex-shrink:0}
#slice-mode-bar.hidden{display:none}
.slice-info{flex:1}

/* canvas wrapper shadow */
#canvas-inner{box-shadow:0 8px 40px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.05)}
#canvas-inner::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0}

/* ===== THREE-VIEW LAYOUT ===== */
#left-panel{display:flex;flex-direction:row;width:220px;flex-shrink:0;background:#060e1c;border-right:1px solid #0f3060;overflow:hidden}
#left-nav{width:52px;flex-shrink:0;background:#040c18;border-right:1px solid #0a2040;display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px}
.nav-btn{width:44px;height:52px;background:transparent;border:none;border-radius:6px;color:#2a4060;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:9px;transition:all .2s;padding:0}
.nav-btn:hover{background:#0a2040;color:#6a90c0}
.nav-btn.active{background:#0f3060;color:#4a8af0}
.nav-btn svg{flex-shrink:0}
#left-content{flex:1;overflow-y:auto;overflow-x:hidden}
.view-panel{padding:10px 8px}
.view-title{font-size:12px;font-weight:bold;color:#4a8af0;padding:4px 0 8px;border-bottom:1px solid #0f3060;margin-bottom:8px}
.view-section{margin-bottom:10px}
.section-label{font-size:10px;color:#4a6080;margin-bottom:4px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px}
.hint-text{color:#2a4060;font-size:11px;text-align:center;padding:20px 8px;line-height:1.6}
.row-btns{display:flex;flex-wrap:wrap;gap:4px}
.row-inline{display:flex;align-items:center;gap:4px}
.size-btn{flex:1;padding:5px;background:#0a1830;color:#4a8af0;border:1px solid #0f3060;border-radius:4px;font-size:11px;cursor:pointer;transition:all .15s}
.size-btn:hover{background:#0f3060;color:#fff}
.bg-options{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.radio-opt{font-size:11px;color:#6a90c0;display:flex;align-items:center;gap:3px;cursor:pointer}
.full-color{width:100%;height:28px;border:none;border-radius:4px;cursor:pointer;background:transparent}
.upload-btn{width:100%;padding:6px;background:#0a1830;color:#4a8af0;border:1px dashed #0f3060;border-radius:4px;font-size:11px;cursor:pointer;transition:all .15s}
.upload-btn:hover{background:#0f3060;color:#fff;border-style:solid}
.margin-grid{display:grid;grid-template-columns:1fr 48px 1fr;grid-template-rows:auto auto auto;gap:3px;align-items:center;justify-items:center}
.mg-num{width:42px;padding:3px 4px;background:#0a1830;color:#c0c8e0;border:1px solid #0f3060;border-radius:3px;font-size:11px;text-align:center}
.mg-center{font-size:9px;color:#2a4060;text-align:center;white-space:nowrap}
.name-row{background:#0a1830;border:1px solid #0f3060;border-radius:4px;padding:5px 8px;font-size:12px;color:#c0c8e0;cursor:text}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.preset-btn{padding:5px 4px;background:#0a1830;color:#4a6080;border:1px solid #0f3060;border-radius:4px;font-size:10px;cursor:pointer;transition:all .15s;text-align:center}
.preset-btn:hover{background:#0f3060;color:#c0c8e0}
.asset-tabs{display:flex;gap:2px;margin-bottom:8px}
.asset-tab{flex:1;padding:5px;background:#0a1830;color:#4a6080;border:1px solid #0f3060;border-radius:4px;font-size:10px;cursor:pointer;transition:all .15s}
.asset-tab.active{background:#0f3060;color:#4a8af0;border-color:#4a8af0}

/* Module list in page view */
#page-module-list .mod-card{display:flex;align-items:center;gap:4px;padding:5px 6px;background:#0a1830;border:1px solid #0f3060;border-radius:4px;margin-bottom:3px;cursor:pointer;transition:all .15s;font-size:11px;color:#8090a8}
#page-module-list .mod-card:hover{border-color:#2a6aaa;color:#c0c8e0}
#page-module-list .mod-card.active{border-color:#4a8af0;background:#0f1e3a;color:#4a8af0}
#page-module-list .mod-card .mod-seq{width:16px;height:16px;background:#0f3060;border-radius:2px;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#4a6080}
#page-module-list .mod-card .mod-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#page-module-list .mod-card .mod-del{font-size:10px;color:#333;padding:0 2px;flex-shrink:0;background:none;border:none;cursor:pointer}
#page-module-list .mod-card .mod-del:hover{color:#ff4444}
.add-mod-btn{width:100%;padding:6px;background:transparent;color:#2a4a70;border:1px dashed #0f3060;border-radius:4px;font-size:11px;cursor:pointer;transition:all .15s;margin-top:4px}
.add-mod-btn:hover{color:#4a8af0;border-color:#4a8af0}

.hidden{display:none!important}

/* ===== MODE SWITCHER ===== */
.mode-switcher{display:flex;background:#060e1c;border-radius:6px;padding:2px;gap:2px;border:1px solid #0f3060;margin:0 6px}
.mode-btn{padding:4px 14px;border-radius:4px;font-size:12px;font-weight:bold;transition:all .2s;color:#4a6080;background:transparent;border:none;cursor:pointer;white-space:nowrap}
.mode-btn:hover{color:#c0c8e0}
.mode-btn.active{background:#0f3460;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#mode-btn-design.active{background:linear-gradient(135deg,#1a3a6a,#0f3060);color:#7ab8ff}
#mode-btn-content.active{background:linear-gradient(135deg,#1a3a2a,#0f3a20);color:#7affa0}
/* Mode lock note */
.mode-lock-note{background:#1a1a2a;border:1px solid #3a2060;border-radius:4px;padding:6px 10px;font-size:11px;color:#7a5a90;margin-bottom:8px;text-align:center}
/* Mode badge on module list */
.mode-badge{font-size:10px;opacity:0.6;margin-left:2px}

/* Add element button */
.add-el-btn{padding:5px 8px;background:#0f3060;color:#4a8af0;border:1px dashed #2a6aaa;border-radius:4px;font-size:11px;transition:all .15s;cursor:pointer}
.add-el-btn:hover{background:#1a4a80;color:#fff;border-style:solid}

/* Module element list */
.mod-el-item{display:flex;align-items:center;gap:5px;padding:4px 6px;background:#0a1830;border:1px solid #1a4060;border-radius:4px;margin-bottom:3px;cursor:pointer;transition:all .15s}
.mod-el-item:hover{border-color:#4a8af0}
.mod-el-item.active{border-color:#e94560;background:#1a1040}
.mod-el-type{font-size:10px;color:#4a8af0;background:#0f3060;border-radius:2px;padding:1px 4px;flex-shrink:0}
.mod-el-name{flex:1;font-size:11px;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mod-el-del{background:none;color:#555;font-size:11px;padding:0 2px;flex-shrink:0}
.mod-el-del:hover{color:#ff4444}
.el-group{margin-bottom:6px}
.el-group-header{font-size:10px;color:#4a8af0;padding:3px 0 3px 2px;border-bottom:1px solid #0f3060;margin-bottom:3px}

<body>

<!-- MAIN -->
<div id="main">
  <!-- LEFT PANEL -->

<script>
// ===== 1. CONSTANTS =====
const FONTS = [
  {label:'微软雅黑',value:'Microsoft YaHei'},
  {label:'宋体',value:'SimSun'},
  {label:'黑体',value:'SimHei'},
  {label:'仿宋',value:'FangSong'},
  {label:'楷体',value:'KaiTi'},
  {label:'华文细黑',value:'STXihei'},
  {label:'华文楷体',value:'STKaiti'},
  {label:'华文宋体',value:'STSong'},
  {label:'华文仿宋',value:'STFangsong'},
  {label:'Arial',value:'Arial'},
  {label:'Georgia',value:'Georgia'},
  {label:'Times New Roman',value:'Times New Roman'},
  {label:'Courier New',value:'Courier New'},
];

const ASSET_CATS = [
  {key:'backgrounds',label:'背景图',three:true},
  {key:'titleBars',label:'标题栏',three:true},
  {key:'textBoxes',label:'文本框',three:true},
  {key:'images',label:'图片素材',three:false},
  {key:'others',label:'其他',three:false},
];

// ===== 2. APP STATE =====
const appState = {
  version: 4,
  view: 'page',   // 'page' | 'block' | 'content' | 'assets' — three-view system
  mode: 'design', // 'design' | 'content' — kept for compatibility
  zoom: 1.0,
  canvas: {width:750, bgColor:'#1a1a2e'},
  assets: {backgrounds:[], titleBars:[], textBoxes:[], images:[], others:[]},
  modules: [],
  selectedModuleId: null,
  selectedElementId: null,
  sliceLines: [],
  showGuides: true,
  sliceMode: false,
};

// ===== HISTORY (UNDO/REDO) =====
const history = {
  stack: [],    // Array of snapshots (JSON strings of modules)
  cursor: -1,   // Current position in stack
  maxSize: 50,  // Max history steps
  isPaused: false, // Prevent recording during undo/redo operations
};

// ===== 3. UTILITY FUNCTIONS =====
let _uidCounter = 1;
function uid() { return 'id_' + Date.now() + '_' + (_uidCounter++); }

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function loadImagePromise(src) {
  return new Promise((resolve) => {
    if (!src) { resolve(null); return; }
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

// Image cache keyed by dataUrl (first 64 chars as key prefix)
const imgCache = {};
async function getCachedImage(dataUrl) {
  if (!dataUrl) return null;
  const key = dataUrl.substring(0, 80);
  if (imgCache[key] && imgCache[key].complete) return imgCache[key];
  const img = await loadImagePromise(dataUrl);
  if (img) imgCache[key] = img;
  return img;
}

// File picker helper
function pickFile(accept) {
  return new Promise((resolve) => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = accept;
    inp.onchange = () => resolve(inp.files[0] || null);
    inp.click();
  });
}

function fileToDataUrl(file) {
  return new Promise((resolve) => {
    const fr = new FileReader();
    fr.onload = e => resolve(e.target.result);
    fr.readAsDataURL(file);
  });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function getModule(id) { return appState.modules.find(m => m.id === id) || null; }
function getElement(modId, elId) {
  const mod = getModule(modId);
  return mod ? (mod.elements.find(e => e.id === elId) || null) : null;
}
function getSelectedModule() { return getModule(appState.selectedModuleId); }
function getSelectedElement() {
  if (!appState.selectedModuleId || !appState.selectedElementId) return null;
  return getElement(appState.selectedModuleId, appState.selectedElementId);
}

// Get asset group from any three-segment category
function getAssetGroup(groupId) {
  for (const cat of ['backgrounds','titleBars','textBoxes']) {
    const g = appState.assets[cat].find(g => g.id === groupId);
    if (g) return g;
  }
  return null;
}

function getSingleAsset(assetId) {
  for (const cat of ['images','others']) {
    const a = appState.assets[cat].find(a => a.id === assetId);
    if (a) return a;
  }
  return null;
}

// Calculate module height based on its elements
function calcModuleHeight(mod) {
  if (!mod.autoHeight) return mod.fixedHeight || 200;
  let maxBottom = 100;
  for (const el of mod.elements) {
    if (!el.visible) continue;
    if (el.type === 'background') continue;
    const bottom = (el.y || 0) + (el.height || 0);
    if (bottom > maxBottom) maxBottom = bottom;
  }
  return maxBottom + (mod.marginBottom || 0) + (mod.paddingTop || 0) + (mod.paddingBottom || 0);
}

// Build a map of {moduleId: {y, height}} for rendering
function buildModuleYMap() {
  const map = {};
  let y = 0;
  for (const mod of appState.modules) {
    const h = calcModuleHeight(mod);
    map[mod.id] = {y, height: h};
    y += h;
  }
  return map;
}

function getTotalCanvasHeight() {
  let h = 0;
  for (const mod of appState.modules) h += calcModuleHeight(mod);
  return Math.max(h, 200);
}

// ===== 4. PERSISTENCE =====
const LS_CONFIG_KEY = 'lpg4-config';
const LS_ASSET_IDX = 'lpg4-asset-index';
const IDB_PREFIX = 'lpg4-asset-';

// idb-keyval may not be available if CDN fails; provide a fallback
function idbSet(key, val) {
  try { return idbKeyval.set(key, val); } catch(e) { return Promise.resolve(); }
}
function idbGet(key) {
  try { return idbKeyval.get(key); } catch(e) { return Promise.resolve(null); }
}
function idbDel(key) {
  try { return idbKeyval.del(key); } catch(e) { return Promise.resolve(); }
}

// Push current modules state into history stack
function historyPush() {
  if (history.isPaused) return;
  // Truncate any forward history when new action is taken
  history.stack = history.stack.slice(0, history.cursor + 1);
  // Push snapshot of current modules (deep clone as JSON string)
  const snapshot = JSON.stringify(appState.modules);
  history.stack.push(snapshot);
  // Enforce max size
  if (history.stack.length > history.maxSize) {
    history.stack.shift();
  }
  history.cursor = history.stack.length - 1;
  saveHistoryToStorage();
  updateHistoryUI();
}

function saveHistoryToStorage() {
  try {
    // Only keep last 20 in localStorage to avoid quota exceeded
    const limited = history.stack.slice(-20);
    localStorage.setItem('lpg4-history', JSON.stringify({
      stack: limited,
      cursor: Math.min(history.cursor, limited.length - 1)
    }));
  } catch(e) {}
}

function loadHistoryFromStorage() {
  try {
    const raw = localStorage.getItem('lpg4-history');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data && Array.isArray(data.stack)) {
      history.stack = data.stack;
      history.cursor = data.cursor ?? data.stack.length - 1;
    }
  } catch(e) {}
}

function historyUndo() {
  if (history.cursor <= 0) return; // Nothing to undo
  history.cursor--;
  history.isPaused = true;
  appState.modules = JSON.parse(history.stack[history.cursor]);
  appState.selectedElementId = null;
  renderAll();
  renderModuleList();
  renderPropsPanel();
  renderOverlay();
  saveConfig();
  history.isPaused = false;
  saveHistoryToStorage();
  updateHistoryUI();
}

function historyRedo() {
  if (history.cursor >= history.stack.length - 1) return; // Nothing to redo
  history.cursor++;
  history.isPaused = true;
  appState.modules = JSON.parse(history.stack[history.cursor]);
  appState.selectedElementId = null;
  renderAll();
  renderModuleList();
  renderPropsPanel();
  renderOverlay();
  saveConfig();
  history.isPaused = false;
  saveHistoryToStorage();
  updateHistoryUI();
}

function updateHistoryUI() {
  const undoBtn = document.getElementById('btn-undo');
  const redoBtn = document.getElementById('btn-redo');
  const historyInfo = document.getElementById('history-info');
  if (undoBtn) undoBtn.disabled = history.cursor <= 0;
  if (redoBtn) redoBtn.disabled = history.cursor >= history.stack.length - 1;
  if (historyInfo) historyInfo.textContent = `${history.cursor + 1}/${history.stack.length}`;
}

function saveConfig() {
  historyPush(); // record state before saving
  // Save canvas + modules structure (no dataUrls)
  const data = {
    version: appState.version,
    canvas: appState.canvas,
    modules: appState.modules,
    sliceLines: appState.sliceLines,
    showGuides: appState.showGuides,
  };
  try { localStorage.setItem(LS_CONFIG_KEY, JSON.stringify(data)); } catch(e) {}
  // Save asset index (no dataUrl)
  const idx = {};
  for (const cat of ASSET_CATS) {
    idx[cat.key] = appState.assets[cat.key].map(a => ({id:a.id, name:a.name}));
  }
  try { localStorage.setItem(LS_ASSET_IDX, JSON.stringify(idx)); } catch(e) {}
}

async function saveAssetData(assetId, dataUrl) {
  await idbSet(IDB_PREFIX + assetId, dataUrl);
}

async function loadAssetData(assetId) {
  return await idbGet(IDB_PREFIX + assetId);
}

async function deleteAssetData(assetId) {
  await idbDel(IDB_PREFIX + assetId);
}

async function loadAllFromStorage() {
  // Load config
  const raw = localStorage.getItem(LS_CONFIG_KEY);
  if (raw) {
    try {
      const data = JSON.parse(raw);
      if (data.canvas) appState.canvas = data.canvas;
      if (data.modules) appState.modules = data.modules;
      if (data.sliceLines) appState.sliceLines = data.sliceLines;
      if (typeof data.showGuides === 'boolean') appState.showGuides = data.showGuides;
    } catch(e) {}
  }
  // Load asset index + dataUrls from IDB
  const idxRaw = localStorage.getItem(LS_ASSET_IDX);
  if (idxRaw) {
    try {
      const idx = JSON.parse(idxRaw);
      for (const cat of ASSET_CATS) {
        const entries = idx[cat.key] || [];
        if (cat.three) {
          for (const entry of entries) {
            const headUrl = await loadAssetData(entry.id + '_head');
            const midUrl  = await loadAssetData(entry.id + '_mid');
            const tailUrl = await loadAssetData(entry.id + '_tail');
            appState.assets[cat.key].push({
              id: entry.id, name: entry.name,
              head: headUrl ? {dataUrl: headUrl} : null,
              mid:  midUrl  ? {dataUrl: midUrl}  : null,
              tail: tailUrl ? {dataUrl: tailUrl} : null,
            });
          }
        } else {
          for (const entry of entries) {
            const dataUrl = await loadAssetData(entry.id);
            if (dataUrl) appState.assets[cat.key].push({id:entry.id, name:entry.name, dataUrl});
          }
        }
      }
    } catch(e) {}
  }
}

// ===== 5. CANVAS RENDERING =====
const mainCanvas = document.getElementById('main-canvas');
const ctx = mainCanvas.getContext('2d');
const overlayCanvas = document.getElementById('overlay-canvas');
const octx = overlayCanvas.getContext('2d');

// moduleYMap is updated every render
let moduleYMap = {};

function resizeCanvases() {
  const w = appState.canvas.width;
  const h = getTotalCanvasHeight();
  mainCanvas.width = w;
  mainCanvas.height = h;
  overlayCanvas.width = w;
  overlayCanvas.height = h;
}

async function renderAll() {
  resizeCanvases();
  moduleYMap = buildModuleYMap();
  const w = appState.canvas.width;
  const h = mainCanvas.height;

  // Base background
  ctx.fillStyle = appState.canvas.bgColor || '#1a1a2e';
  ctx.fillRect(0, 0, w, h);

  // Draw each module's elements
  for (const mod of appState.modules) {
    const mInfo = moduleYMap[mod.id];
    if (!mInfo) continue;
    const modY = mInfo.y;
    const modH = mInfo.height;

    // Sort by zIndex
    const sorted = [...mod.elements].sort((a, b) => (a.zIndex||0) - (b.zIndex||0));
    for (const el of sorted) {
      if (!el.visible) continue;
      await drawElement(ctx, el, (mod.paddingLeft||0), modY + (mod.paddingTop||0), w, modH);
    }

    // Module border hint (faint separator)
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, modY + modH);
    ctx.lineTo(w, modY + modH);
    ctx.stroke();
  }

  renderOverlay();
  // Adjust canvas-inner scale after every render
  if (typeof applyCanvasScale === 'function') applyCanvasScale();
}

async function drawElement(ctx, el, modX, modY, canvasW, modH) {
  const x = modX + (el.x || 0);
  const y = modY + (el.y || 0);
  const w = el.width || 0;
  const h = el.height || 0;
  if (w <= 0 || h <= 0) return;

  switch(el.type) {
    case 'background': await drawBackground(ctx, el, modX, modY, canvasW, modH); break;
    case 'image':      await drawImageElement(ctx, el, x, y, w, h); break;
    case 'text':       drawTextElement(ctx, el, x, y, w, h); break;
    case 'title-bar':  await drawTitleBar(ctx, el, x, y, w, h); break;
    case 'text-box':   await drawTextBox(ctx, el, x, y, w, h); break;
  }
  // Apply lock overlay if element is locked in current view
  const _isLocked = (appState.view === 'block' && isContentEl(el)) ||
                    (appState.view === 'content' && isDesignEl(el));
  if (_isLocked) {
    const _ox = el.type === 'background' ? modX : x;
    const _oy = el.type === 'background' ? modY : y;
    const _ow = el.type === 'background' ? canvasW : w;
    const _oh = el.type === 'background' ? modH : h;
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#060a18';
    ctx.fillRect(_ox, _oy, _ow, _oh);
    ctx.restore();
  }
}

async function drawBackground(ctx, el, x, y, w, h) {
  const bgType = el.bgType || 'solid';
  if (bgType === 'solid') {
    ctx.fillStyle = el.bgColor || '#222';
    ctx.fillRect(x, y, w, h);
  } else if (bgType === 'linear-gradient') {
    const angle = (el.bgAngle || 180) * Math.PI / 180;
    const cx = x + w/2, cy = y + h/2;
    const r = Math.sqrt(w*w + h*h) / 2;
    const gx0 = cx - Math.sin(angle)*r, gy0 = cy - Math.cos(angle)*r;
    const gx1 = cx + Math.sin(angle)*r, gy1 = cy + Math.cos(angle)*r;
    const grad = ctx.createLinearGradient(gx0, gy0, gx1, gy1);
    grad.addColorStop(0, el.bgColor || '#000');
    grad.addColorStop(1, el.bgColor2 || '#fff');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);
  } else if (bgType === 'radial-gradient') {
    const grad = ctx.createRadialGradient(x+w/2, y+h/2, 0, x+w/2, y+h/2, Math.max(w,h)/2);
    grad.addColorStop(0, el.bgColor || '#000');
    grad.addColorStop(1, el.bgColor2 || '#fff');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, w, h);
  } else if (bgType === 'three-segment') {
    const grp = getAssetGroup(el.bgAssetGroupId);
    if (!grp) {
      ctx.fillStyle = '#333'; ctx.fillRect(x, y, w, h); return;
    }
    const headImg = grp.head ? await getCachedImage(grp.head.dataUrl) : null;
    const midImg  = grp.mid  ? await getCachedImage(grp.mid.dataUrl)  : null;
    const tailImg = grp.tail ? await getCachedImage(grp.tail.dataUrl) : null;
    const headH = headImg ? headImg.naturalHeight : 0;
    const tailH = tailImg ? tailImg.naturalHeight : 0;
    const midH = Math.max(0, h - headH - tailH);
    if (headImg) ctx.drawImage(headImg, x, y, w, headH);
    if (midImg && midH > 0) ctx.drawImage(midImg, x, y + headH, w, midH);
    if (tailImg) ctx.drawImage(tailImg, x, y + headH + midH, w, tailH);
  }
}

async function drawTitleBar(ctx, el, x, y, w, h) {
  const grp = getAssetGroup(el.assetGroupId);
  if (grp) {
    const headImg = grp.head ? await getCachedImage(grp.head.dataUrl) : null;
    const midImg  = grp.mid  ? await getCachedImage(grp.mid.dataUrl)  : null;
    const tailImg = grp.tail ? await getCachedImage(grp.tail.dataUrl) : null;
    const headW = headImg ? headImg.naturalWidth : 0;
    const tailW = tailImg ? tailImg.naturalWidth : 0;
    const midW = Math.max(0, w - headW - tailW);
    if (headImg) ctx.drawImage(headImg, x, y, headW, h);
    if (midImg && midW > 0) ctx.drawImage(midImg, x + headW, y, midW, h);
    if (tailImg) ctx.drawImage(tailImg, x + headW + midW, y, tailW, h);
  } else {
    // Default fallback bar
    ctx.fillStyle = '#2a4a8a'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#3a6aaa'; ctx.fillRect(x, y, w, 3);
  }
  // Draw text on top
  if (el.text) {
    const p = el.padding || {top:8,right:12,bottom:8,left:12};
    const textX = x + (p.left||12);
    const textW = w - (p.left||12) - (p.right||12);
    const textY = y + (p.top||8);
    const textH = h - (p.top||8) - (p.bottom||8);
    ctx.save();
    ctx.clip(new Path2D(`M${x} ${y} L${x+w} ${y} L${x+w} ${y+h} L${x} ${y+h} Z`));
    applyTextStyle(ctx, el);
    ctx.textBaseline = 'middle';
    const mid = textY + textH/2;
    const drawY = mid - (el.fontSize||24)/2;
    const lhT = (el.fontSize||24)*(el.lineHeight||1.4);
    // Apply text effect
    if (el.textEffect) {
      const te = el.textEffect;
      if (te.type === 'shadow') {
        ctx.shadowColor = te.color || 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = te.blur || 4;
        ctx.shadowOffsetX = te.dx || 2;
        ctx.shadowOffsetY = te.dy || 2;
      } else if (te.type === 'gradient') {
        const grad = ctx.createLinearGradient(textX, drawY, textX, drawY + textH);
        grad.addColorStop(0, te.gradColor1 || '#ffcc00');
        grad.addColorStop(1, te.gradColor2 || '#ff4400');
        ctx.fillStyle = grad;
      }
    }
    wrapTextDraw(ctx, el.text, textX, drawY, textW, lhT, el.align||'center', true, el.letterSpacing||0, 0);
    if (el.textEffect && el.textEffect.type === 'stroke') {
      const te = el.textEffect;
      ctx.strokeStyle = te.strokeColor || '#000000';
      ctx.lineWidth = te.strokeWidth || 2;
      ctx.lineJoin = 'round';
      wrapTextDraw_stroke(ctx, el.text, textX, drawY, textW, lhT, el.align||'center', true, el.letterSpacing||0, 0);
    }
    ctx.restore();
  }
}

async function drawTextBox(ctx, el, x, y, w, h) {
  const grp = getAssetGroup(el.assetGroupId);
  if (grp) {
    const headImg = grp.head ? await getCachedImage(grp.head.dataUrl) : null;
    const midImg  = grp.mid  ? await getCachedImage(grp.mid.dataUrl)  : null;
    const tailImg = grp.tail ? await getCachedImage(grp.tail.dataUrl) : null;
    const headH = headImg ? headImg.naturalHeight : 0;
    const tailH = tailImg ? tailImg.naturalHeight : 0;
    const midH = Math.max(0, h - headH - tailH);
    if (headImg) ctx.drawImage(headImg, x, y, w, headH);
    if (midImg && midH > 0) ctx.drawImage(midImg, x, y + headH, w, midH);
    if (tailImg) ctx.drawImage(tailImg, x, y + headH + midH, w, tailH);
  } else {
    ctx.fillStyle = '#1a3050'; ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#2a5080'; ctx.lineWidth = 1;
    ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);
  }
  // Draw text
  if (el.text) {
    const p = el.padding || {top:12,right:14,bottom:12,left:14};
    const tx = x + (p.left||14);
    const ty = y + (p.top||12);
    const tw = w - (p.left||14) - (p.right||14);
    const th = h - (p.top||12) - (p.bottom||12);
    const lhB = (el.fontSize||16)*(el.lineHeight||1.6);
    ctx.save();
    applyTextStyle(ctx, el);
    if (el.textEffect) {
      const te = el.textEffect;
      if (te.type === 'shadow') {
        ctx.shadowColor = te.color || 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = te.blur || 4;
        ctx.shadowOffsetX = te.dx || 2;
        ctx.shadowOffsetY = te.dy || 2;
      } else if (te.type === 'gradient') {
        const grad = ctx.createLinearGradient(tx, ty, tx, ty + th);
        grad.addColorStop(0, te.gradColor1 || '#ffcc00');
        grad.addColorStop(1, te.gradColor2 || '#ff4400');
        ctx.fillStyle = grad;
      }
    }
    wrapTextDraw(ctx, el.text, tx, ty, tw, lhB, el.align||'left', false, el.letterSpacing||0, el.paraSpacing||0);
    if (el.textEffect && el.textEffect.type === 'stroke') {
      const te = el.textEffect;
      ctx.strokeStyle = te.strokeColor || '#000000';
      ctx.lineWidth = te.strokeWidth || 2;
      ctx.lineJoin = 'round';
      wrapTextDraw_stroke(ctx, el.text, tx, ty, tw, lhB, el.align||'left', false, el.letterSpacing||0, el.paraSpacing||0);
    }
    ctx.restore();
  }
}

async function drawImageElement(ctx, el, x, y, w, h) {
  ctx.save();
  // Clip to element bounds (also handles cover overflow)
  ctx.beginPath();
  if (el.borderRadius) {
    roundRectPath(ctx, x, y, w, h, el.borderRadius);
  } else {
    ctx.rect(x, y, w, h);
  }
  ctx.clip();
  if (typeof el.opacity === 'number') ctx.globalAlpha = el.opacity;

  const asset = getSingleAsset(el.assetId);
  if (asset && asset.dataUrl) {
    const img = await getCachedImage(asset.dataUrl);
    if (img) {
      drawImageFit(ctx, img, x, y, w, h, el.fit || 'cover');
    }
  } else {
    // Placeholder
    ctx.fillStyle = '#1a2a3a'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#3a5a7a'; ctx.font = '14px Microsoft YaHei';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('图片', x+w/2, y+h/2);
  }
  ctx.restore();
}

function drawImageFit(ctx, img, x, y, w, h, fit) {
  const iw = img.naturalWidth, ih = img.naturalHeight;
  if (fit === 'fill') {
    ctx.drawImage(img, x, y, w, h);
  } else if (fit === 'none') {
    ctx.drawImage(img, x, y, iw, ih);
  } else if (fit === 'contain') {
    const scale = Math.min(w/iw, h/ih);
    const sw = iw*scale, sh = ih*scale;
    ctx.drawImage(img, x+(w-sw)/2, y+(h-sh)/2, sw, sh);
  } else { // cover
    const scale = Math.max(w/iw, h/ih);
    const dw = iw * scale, dh = ih * scale;
    ctx.drawImage(img, x - (dw-w)/2, y - (dh-h)/2, dw, dh);
  }
}

function drawTextElement(ctx, el, x, y, w, h) {
  ctx.save();
  applyTextStyle(ctx, el);
  // Apply text effect
  if (el.textEffect) {
    const te = el.textEffect;
    if (te.type === 'shadow') {
      ctx.shadowColor = te.color || 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = te.blur || 4;
      ctx.shadowOffsetX = te.dx || 2;
      ctx.shadowOffsetY = te.dy || 2;
    } else if (te.type === 'gradient') {
      const grad = ctx.createLinearGradient(x, y, x, y + h);
      grad.addColorStop(0, te.gradColor1 || '#ffcc00');
      grad.addColorStop(1, te.gradColor2 || '#ff4400');
      ctx.fillStyle = grad;
    }
  }
  const lh = (el.fontSize||16) * (el.lineHeight||1.5);
  wrapTextDraw(ctx, el.text||'', x, y, w, lh, el.align||'left', false, el.letterSpacing||0, el.paraSpacing||0);
  if (el.textEffect && el.textEffect.type === 'stroke') {
    const te = el.textEffect;
    ctx.strokeStyle = te.strokeColor || '#000000';
    ctx.lineWidth = te.strokeWidth || 2;
    ctx.lineJoin = 'round';
    wrapTextDraw_stroke(ctx, el.text||'', x, y, w, lh, el.align||'left', false, el.letterSpacing||0, el.paraSpacing||0);
  }
  ctx.restore();
}

function applyTextStyle(ctx, el) {
  const fs = el.fontSize || 16;
  const font = el.font || 'Microsoft YaHei';
  const bold = el.bold ? 'bold ' : '';
  const italic = el.italic ? 'italic ' : '';
  ctx.font = `${italic}${bold}${fs}px "${font}"`;
  ctx.fillStyle = el.color || '#ffffff';
  ctx.textBaseline = 'top';
}

// Helper: same as wrapTextDraw but calls strokeText instead of fillText
function wrapTextDraw_stroke(ctx, text, x, y, maxW, lineH, align, singleLine, letterSpacing, paraSpacing) {
  const ls = letterSpacing || 0;
  const ps = paraSpacing || 0;
  ctx.textBaseline = 'top';
  const lines = (text || '').split('\n');
  let curY = y;

  function measureWithLS(str) {
    if (!ls) return ctx.measureText(str).width;
    let w = 0;
    for (const ch of str) w += ctx.measureText(ch).width + ls;
    return Math.max(0, w - ls);
  }

  function drawWithLS(str, dx, dy) {
    if (!ls) { ctx.strokeText(str, dx, dy); return; }
    let cx = dx;
    for (const ch of str) {
      ctx.strokeText(ch, cx, dy);
      cx += ctx.measureText(ch).width + ls;
    }
  }

  function getLineStartX(lineWidth) {
    const a = align || 'left';
    if (a === 'center') return x + (maxW - lineWidth) / 2;
    if (a === 'right') return x + maxW - lineWidth;
    return x;
  }

  for (const paragraph of lines) {
    if (singleLine) {
      const lw = measureWithLS(paragraph);
      ctx.textAlign = 'left';
      drawWithLS(paragraph, getLineStartX(lw), curY);
      curY += lineH;
      break;
    }
    if (paragraph === '') { curY += lineH + ps; continue; }
    const chars = [...paragraph];
    let lineStr = '';
    for (const ch of chars) {
      const testStr = lineStr + ch;
      if (measureWithLS(testStr) > maxW && lineStr.length > 0) {
        ctx.textAlign = 'left';
        drawWithLS(lineStr, getLineStartX(measureWithLS(lineStr)), curY);
        curY += lineH;
        lineStr = ch;
      } else {
        lineStr = testStr;
      }
    }
    if (lineStr) {
      ctx.textAlign = 'left';
      drawWithLS(lineStr, getLineStartX(measureWithLS(lineStr)), curY);
      curY += lineH;
    }
    curY += ps;
  }
}

function wrapTextDraw(ctx, text, x, y, maxW, lineH, align, singleLine, letterSpacing, paraSpacing) {
  const ls = letterSpacing || 0;
  const ps = paraSpacing || 0;
  ctx.textBaseline = 'top';
  const lines = (text || '').split('\n');
  let curY = y;

  function measureWithLS(str) {
    if (!ls) return ctx.measureText(str).width;
    let w = 0;
    for (const ch of str) w += ctx.measureText(ch).width + ls;
    return Math.max(0, w - ls);
  }

  function drawWithLS(str, dx, dy) {
    if (!ls) { ctx.fillText(str, dx, dy); return; }
    let cx = dx;
    for (const ch of str) {
      ctx.fillText(ch, cx, dy);
      cx += ctx.measureText(ch).width + ls;
    }
  }

  function getLineStartX(lineWidth) {
    const a = align || 'left';
    if (a === 'center') return x + (maxW - lineWidth) / 2;
    if (a === 'right') return x + maxW - lineWidth;
    return x;
  }

  for (const paragraph of lines) {
    if (singleLine) {
      const lw = measureWithLS(paragraph);
      ctx.textAlign = 'left';
      drawWithLS(paragraph, getLineStartX(lw), curY);
      curY += lineH;
      break;
    }
    if (paragraph === '') { curY += lineH + ps; continue; }
    const chars = [...paragraph];
    let lineStr = '';
    for (const ch of chars) {
      const testStr = lineStr + ch;
      if (measureWithLS(testStr) > maxW && lineStr.length > 0) {
        ctx.textAlign = 'left';
        drawWithLS(lineStr, getLineStartX(measureWithLS(lineStr)), curY);
        curY += lineH;
        lineStr = ch;
      } else {
        lineStr = testStr;
      }
    }
    if (lineStr) {
      ctx.textAlign = 'left';
      drawWithLS(lineStr, getLineStartX(measureWithLS(lineStr)), curY);
      curY += lineH;
    }
    curY += ps;
  }
  return curY - y;
}

function roundRectPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ===== 6. OVERLAY + TRANSFORM CONTROLS =====
const HANDLE_SIZE = 8;
let activeGuideLines = [];

function renderOverlay() {
  octx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  if (appState.showGuides) {
    moduleYMap = buildModuleYMap();
    octx.strokeStyle = 'rgba(100,160,255,0.15)';
    octx.lineWidth = 1;
    octx.setLineDash([4,4]);
    for (const mod of appState.modules) {
      const info = moduleYMap[mod.id];
      if (!info) continue;
      octx.strokeRect(0, info.y, appState.canvas.width, info.height);
      octx.fillStyle = 'rgba(100,160,255,0.4)';
      octx.font = '11px Arial';
      octx.textAlign = 'left';
      octx.textBaseline = 'top';
      octx.setLineDash([]);
      octx.fillText(mod.name, 4, info.y + 3);
      octx.setLineDash([4,4]);
    }
    octx.setLineDash([]);
  }
  for (const line of activeGuideLines) {
    octx.strokeStyle = '#ff3344';
    octx.lineWidth = 1;
    octx.setLineDash([]);
    octx.beginPath();
    if (line.axis === 'v') { octx.moveTo(line.pos, 0); octx.lineTo(line.pos, overlayCanvas.height); }
    else { octx.moveTo(0, line.pos); octx.lineTo(overlayCanvas.width, line.pos); }
    octx.stroke();
  }
  const el = getSelectedElement();
  if (!el) return;
  const mod = getSelectedModule();
  if (!mod) return;
  const mInfo = moduleYMap[mod.id];
  if (!mInfo) return;
  const ex = el.x, ey = mInfo.y + el.y, ew = el.width, eh = el.height;
  octx.strokeStyle = '#4a8af0';
  octx.lineWidth = 1.5;
  octx.setLineDash([4,3]);
  octx.strokeRect(ex-0.5, ey-0.5, ew+1, eh+1);
  octx.setLineDash([]);
  octx.fillStyle = '#4a8af0';
  octx.font = '10px Arial';
  octx.textAlign = 'right';
  octx.textBaseline = 'bottom';
  octx.fillText(Math.round(ew)+'x'+Math.round(eh), ex+ew, ey-2);
  const hps = getHandlePositions(ex, ey, ew, eh);
  for (const [, hx, hy] of hps) {
    octx.fillStyle = '#fff';
    octx.strokeStyle = '#4a8af0';
    octx.lineWidth = 1.5;
    octx.fillRect(hx-HANDLE_SIZE/2, hy-HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
    octx.strokeRect(hx-HANDLE_SIZE/2, hy-HANDLE_SIZE/2, HANDLE_SIZE, HANDLE_SIZE);
  }
}

function getHandlePositions(x, y, w, h) {
  return [
    ['tl',x,y],['tc',x+w/2,y],['tr',x+w,y],
    ['ml',x,y+h/2],['mr',x+w,y+h/2],
    ['bl',x,y+h],['bc',x+w/2,y+h],['br',x+w,y+h],
  ];
}

function screenToCanvas(screenX, screenY) {
  const rect = overlayCanvas.getBoundingClientRect();
  const scaleX = overlayCanvas.width / rect.width;
  const scaleY = overlayCanvas.height / rect.height;
  return { x: (screenX - rect.left)*scaleX, y: (screenY - rect.top)*scaleY };
}

function hitTest(cx, cy) {
  const el = getSelectedElement();
  if (el) {
    const mod = getSelectedModule();
    const mInfo = moduleYMap[mod.id];
    if (mInfo) {
      const ex=el.x, ey=mInfo.y+el.y, ew=el.width, eh=el.height;
      const hps = getHandlePositions(ex,ey,ew,eh);
      for (const [name,hx,hy] of hps) {
        if (Math.abs(cx-hx)<=HANDLE_SIZE && Math.abs(cy-hy)<=HANDLE_SIZE)
          return {type:'handle',handle:name,modId:mod.id,elId:el.id};
      }
      if (cx>=ex && cx<=ex+ew && cy>=ey && cy<=ey+eh)
        return {type:'move',modId:mod.id,elId:el.id};
    }
  }
  const mod = getSelectedModule();
  if (!mod) return null;
  const mInfo = moduleYMap[mod.id];
  if (!mInfo) return null;
  const sorted = [...mod.elements].sort((a,b)=>(b.zIndex||0)-(a.zIndex||0));
  for (const e of sorted) {
    if (!e.visible) continue;
    // Filter by view
    if (appState.view === 'page') continue; // in page view, don't select individual elements
    if (appState.view === 'assets') continue;
    if (appState.view === 'block' && !isDesignEl(e)) continue;
    if (appState.view === 'content' && isDesignEl(e)) continue;
    if (cx>=e.x && cx<=e.x+e.width && cy>=mInfo.y+e.y && cy<=mInfo.y+e.y+e.height)
      return {type:'element',modId:mod.id,elId:e.id};
  }
  return null;
}

let dragState = null;
const SNAP_DIST = 6;

// ===== CONTEXT MENU =====
let ctxMenu = null;
function showContextMenu(x, y, items) {
  removeContextMenu();
  ctxMenu = document.createElement('div');
  ctxMenu.style.cssText = `position:fixed;left:${x}px;top:${y}px;background:#16213e;border:1px solid #0f3460;border-radius:6px;padding:4px 0;z-index:9000;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.6)`;
  for (const item of items) {
    if (item === '-') {
      const sep = document.createElement('div');
      sep.style.cssText = 'height:1px;background:#0f3460;margin:3px 0';
      ctxMenu.appendChild(sep);
    } else {
      const btn = document.createElement('div');
      btn.textContent = item.label;
      btn.style.cssText = `padding:6px 14px;cursor:pointer;font-size:12px;color:${item.danger?'#ff6666':'#c0c8e0'};transition:background .1s`;
      btn.onmouseenter = () => btn.style.background = '#0f3460';
      btn.onmouseleave = () => btn.style.background = '';
      btn.onclick = () => { removeContextMenu(); item.action(); };
      ctxMenu.appendChild(btn);
    }
  }
  document.body.appendChild(ctxMenu);
  setTimeout(() => document.addEventListener('click', removeContextMenu, {once:true}), 10);
}
function removeContextMenu() {
  if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
}

function initCanvasInteraction() {
  overlayCanvas.classList.add('interactive');
  overlayCanvas.addEventListener('mousedown', onMouseDown);
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
  // Right-click context menu
  overlayCanvas.addEventListener('contextmenu', onCanvasContextMenu);
  // Delete key
  document.addEventListener('keydown', e => {
    // Undo/Redo shortcuts
    if (e.ctrlKey && e.key === 'z' && !e.shiftKey) {
      e.preventDefault();
      historyUndo();
      return;
    }
    if ((e.ctrlKey && e.key === 'y') || (e.ctrlKey && e.shiftKey && e.key === 'z')) {
      e.preventDefault();
      historyRedo();
      return;
    }
    if ((e.key === 'Delete' || e.key === 'Backspace') && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) {
      const el = getSelectedElement();
      if (el) { deleteElementById(el.id); }
    }
    // Ctrl+D duplicate
    if (e.ctrlKey && e.key === 'd') {
      e.preventDefault();
      duplicateSelectedElement();
    }
    // Arrow keys nudge
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key) && !['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) {
      const el = getSelectedElement();
      if (!el || el.locked) return;
      const d = e.shiftKey ? 10 : 1;
      if (e.key === 'ArrowLeft') el.x -= d;
      if (e.key === 'ArrowRight') el.x += d;
      if (e.key === 'ArrowUp') el.y -= d;
      if (e.key === 'ArrowDown') el.y += d;
      renderAll(); updatePropsTransform(); renderOverlay(); saveConfig();
    }
  });
}

function onCanvasContextMenu(e) {
  e.preventDefault();
  const cp = screenToCanvas(e.clientX, e.clientY);
  const hit = hitTest(cp.x, cp.y);
  const mod = getSelectedModule();
  const items = [];
  if (hit && hit.type === 'element') {
    const el = getElement(hit.modId, hit.elId);
    items.push({label:`📌 ${el?.type||'元素'}`, action:()=>{}});
    items.push('-');
    items.push({label:'⧉ 复制元素', action: duplicateSelectedElement});
    items.push({label:'⬆ 上移层级', action:()=>layerOp('up')});
    items.push({label:'⬇ 下移层级', action:()=>layerOp('down')});
    items.push('-');
    items.push({label:'🗑 删除元素', danger:true, action:()=>deleteElementById(hit.elId)});
  } else if (mod) {
    items.push({label:`📦 ${mod.name}`, action:()=>{}});
    items.push('-');
    items.push({label:'＋ 添加标题栏', action:()=>addElementToModule('title-bar')});
    items.push({label:'＋ 添加文本框', action:()=>addElementToModule('text-box')});
    items.push({label:'＋ 添加文字', action:()=>addElementToModule('text')});
    items.push({label:'＋ 添加图片', action:()=>addElementToModule('image')});
    items.push('-');
    items.push({label:'⧉ 复制模块', action:()=>duplicateModule(mod.id)});
    items.push({label:'🗑 删除模块', danger:true, action:()=>deleteModule(mod.id)});
  } else {
    items.push({label:'＋ 添加新模块', action: showTemplateModal});
  }
  showContextMenu(e.clientX, e.clientY, items);
}

function duplicateSelectedElement() {
  const mod = getSelectedModule();
  if (!mod) return;
  const el = getSelectedElement();
  if (!el) return;
  const clone = deepClone(el);
  clone.id = uid();
  clone.x += 10; clone.y += 10;
  mod.elements.push(clone);
  appState.selectedElementId = clone.id;
  renderAll(); renderPropsPanel(); renderOverlay(); saveConfig();
}

function onMouseDown(e) {
  if (e.button !== 0) return;
  const cp = screenToCanvas(e.clientX, e.clientY);
  if (appState.sliceMode) {
    appState.sliceLines.push(Math.round(cp.y));
    appState.sliceLines.sort((a,b)=>a-b);
    renderSliceOverlay();
    saveConfig();
    return;
  }
  const hit = hitTest(cp.x, cp.y);
  if (!hit) {
    // Try selecting a module by click area
    moduleYMap = buildModuleYMap();
    let clickedMod = null;
    for (const mod of appState.modules) {
      const info = moduleYMap[mod.id];
      if (cp.y >= info.y && cp.y < info.y + info.height) { clickedMod = mod; break; }
    }
    if (clickedMod && clickedMod.id !== appState.selectedModuleId) {
      appState.selectedModuleId = clickedMod.id;
      appState.selectedElementId = null;
      renderModuleList();
    } else {
      appState.selectedElementId = null;
    }
    renderOverlay();
    renderPropsPanel();
    return;
  }
  if (hit.type === 'element') {
    appState.selectedElementId = hit.elId;
    renderOverlay();
    renderPropsPanel();
  }
  const elId = hit.elId || (appState.selectedElementId);
  const el = getElement(hit.modId, elId);
  const mod = getModule(hit.modId);
  const mInfo = moduleYMap[mod.id];
  if (!el || !mInfo) return;
  if (hit.type === 'handle') {
    dragState = { mode:'resize', handle:hit.handle, modId:hit.modId, elId:elId,
      startCX:cp.x, startCY:cp.y, origX:el.x, origY:el.y, origW:el.width, origH:el.height, modY:mInfo.y };
  } else {
    dragState = { mode:'move', modId:hit.modId, elId:elId,
      startCX:cp.x, startCY:cp.y, origX:el.x, origY:el.y, origW:el.width, origH:el.height, modY:mInfo.y };
  }
  e.preventDefault();
}

function getSnapGuides(el, modId) {
  const cw = appState.canvas.width;
  const mod = getModule(modId);
  const mInfo = moduleYMap[modId];
  const guides = [{axis:'v',pos:0},{axis:'v',pos:cw/2},{axis:'v',pos:cw}];
  guides.push({axis:'h',pos:mInfo.y},{axis:'h',pos:mInfo.y+mInfo.height});
  for (const e of mod.elements) {
    if (e.id === el.id || !e.visible) continue;
    const ey = mInfo.y + e.y;
    guides.push({axis:'v',pos:e.x},{axis:'v',pos:e.x+e.width/2},{axis:'v',pos:e.x+e.width});
    guides.push({axis:'h',pos:ey},{axis:'h',pos:ey+e.height/2},{axis:'h',pos:ey+e.height});
  }
  return guides;
}

function trySnap(val, guides, axis, offsets) {
  const filtered = guides.filter(g=>g.axis===axis);
  let best = null, bestD = SNAP_DIST+1;
  for (const off of offsets) {
    for (const g of filtered) {
      const d = Math.abs((val+off) - g.pos);
      if (d < bestD) { bestD = d; best = {snapped: g.pos - off, guide: g.pos}; }
    }
  }
  return best;
}

function onMouseMove(e) {
  if (!dragState) return;
  const cp = screenToCanvas(e.clientX, e.clientY);
  const dx = cp.x - dragState.startCX;
  const dy = cp.y - dragState.startCY;
  const el = getElement(dragState.modId, dragState.elId);
  if (!el) { dragState=null; return; }
  activeGuideLines = [];

  if (dragState.mode === 'move') {
    let nx = dragState.origX + dx;
    let ny = dragState.origY + dy;
    if (appState.showGuides) {
      const guides = getSnapGuides(el, dragState.modId);
      const sx = trySnap(nx, guides, 'v', [0, el.width/2, el.width]);
      if (sx) { nx = sx.snapped; activeGuideLines.push({axis:'v',pos:sx.guide}); }
      const mY = dragState.modY;
      const sy = trySnap(mY+ny, guides, 'h', [0, el.height/2, el.height]);
      if (sy) { ny = sy.snapped - mY; activeGuideLines.push({axis:'h',pos:sy.guide}); }
    }
    el.x = Math.round(nx); el.y = Math.round(ny);
    overlayCanvas.style.cursor = 'move';
  } else {
    let x=dragState.origX, y=dragState.origY, w=dragState.origW, h=dragState.origH;
    const hn = dragState.handle;
    if (hn.includes('r')) { w = Math.max(20, dragState.origW+dx); }
    if (hn.includes('l')) { const nw=Math.max(20,dragState.origW-dx); x=dragState.origX+(dragState.origW-nw); w=nw; }
    if (hn.includes('b')) { h = Math.max(20, dragState.origH+dy); }
    if (hn.includes('t')) { const nh=Math.max(20,dragState.origH-dy); y=dragState.origY+(dragState.origH-nh); h=nh; }
    el.x=Math.round(x); el.y=Math.round(y); el.width=Math.round(w); el.height=Math.round(h);
    const cursors = {tl:'nwse-resize',tc:'ns-resize',tr:'nesw-resize',ml:'ew-resize',mr:'ew-resize',bl:'nesw-resize',bc:'ns-resize',br:'nwse-resize'};
    overlayCanvas.style.cursor = cursors[hn]||'default';
  }
  renderAll();
  updatePropsTransform();
}

function onMouseUp(e) {
  if (dragState) { activeGuideLines=[]; dragState=null; renderOverlay(); saveConfig(); }
}

overlayCanvas.addEventListener('mousemove', function(e) {
  if (dragState) return;
  const cp = screenToCanvas(e.clientX, e.clientY);
  const hit = hitTest(cp.x, cp.y);
  if (!hit) { overlayCanvas.style.cursor='default'; return; }
  if (hit.type==='handle') {
    const c={tl:'nwse-resize',tc:'ns-resize',tr:'nesw-resize',ml:'ew-resize',mr:'ew-resize',bl:'nesw-resize',bc:'ns-resize',br:'nwse-resize'};
    overlayCanvas.style.cursor = c[hit.handle]||'default';
  } else { overlayCanvas.style.cursor='move'; }
});

// ===== 7. LEFT PANEL: MODULE MANAGEMENT =====
let leftTab = 'modules';
function switchLeftTab(tab) {
  leftTab = tab;
  // Legacy tab support (no-op if elements removed)
  const tm = document.getElementById('tab-modules'); if (tm) tm.classList.toggle('active', tab==='modules');
  const ta = document.getElementById('tab-assets'); if (ta) ta.classList.toggle('active', tab==='assets');
  const pm = document.getElementById('panel-modules'); if (pm) pm.classList.toggle('hidden', tab!=='modules');
  const pa = document.getElementById('panel-assets'); if (pa) pa.classList.toggle('hidden', tab!=='assets');
  if (tab==='assets') renderAssetPanel();
}

function renderModuleList() {
  // Also sync the three-view page module list
  if (typeof renderPageView === 'function') renderPageView();
  const list = document.getElementById('module-list');
  if (!list) return;
  list.innerHTML = '';
  appState.modules.forEach((mod, idx) => {
    const card = document.createElement('div');
    card.className = 'module-card' + (mod.id===appState.selectedModuleId?' selected':'');
    card.draggable = true;
    card.dataset.id = mod.id;
    card.innerHTML = `
      <span class="mod-num">${idx+1}</span>
      <span class="mod-name" ondblclick="startRenameModule('${mod.id}',this);event.stopPropagation()">${escHtml(mod.name)}</span>
      <span class="mode-badge ${appState.mode === 'design' ? 'design' : 'content'}">${appState.mode === 'design' ? '🎨' : '📝'}</span>
      <div class="mod-actions">
        <button class="mod-btn" title="复制" onclick="duplicateModule('${mod.id}');event.stopPropagation()">⧉</button>
        <button class="mod-btn" title="删除" onclick="deleteModule('${mod.id}');event.stopPropagation()">✕</button>
      </div>`;
    card.addEventListener('click', () => selectModule(mod.id));
    // Drag reorder
    card.addEventListener('dragstart', e => { e.dataTransfer.setData('modId', mod.id); });
    card.addEventListener('dragover', e => { e.preventDefault(); card.style.borderColor='#e94560'; });
    card.addEventListener('dragleave', () => { card.style.borderColor=''; });
    card.addEventListener('drop', e => {
      e.preventDefault(); card.style.borderColor='';
      const fromId = e.dataTransfer.getData('modId');
      reorderModule(fromId, mod.id);
    });
    list.appendChild(card);
  });
}

function selectModule(id) {
  appState.selectedModuleId = id;
  appState.selectedElementId = null;
  renderModuleList();
  renderOverlay();
  renderPropsPanel();
}

function deleteModule(id) {
  if (!confirm('删除该模块？')) return;
  const idx = appState.modules.findIndex(m=>m.id===id);
  if (idx >= 0) appState.modules.splice(idx, 1);
  if (appState.selectedModuleId===id) {
    appState.selectedModuleId = appState.modules[0]?.id||null;
    appState.selectedElementId = null;
  }
  renderModuleList(); renderAll(); renderPropsPanel(); saveConfig();
}

function duplicateModule(id) {
  const mod = getModule(id);
  if (!mod) return;
  const clone = deepClone(mod);
  clone.id = uid();
  clone.name = mod.name + ' (副本)';
  clone.elements.forEach(e=>e.id=uid());
  const idx = appState.modules.findIndex(m=>m.id===id);
  appState.modules.splice(idx+1, 0, clone);
  renderModuleList(); renderAll(); saveConfig();
}

function reorderModule(fromId, toId) {
  if (fromId===toId) return;
  const fi = appState.modules.findIndex(m=>m.id===fromId);
  const ti = appState.modules.findIndex(m=>m.id===toId);
  if (fi<0||ti<0) return;
  const [mod] = appState.modules.splice(fi, 1);
  appState.modules.splice(ti, 0, mod);
  renderModuleList(); renderAll(); saveConfig();
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Rename selected module
function renameSelectedModule(name) {
  const mod = getSelectedModule();
  if (!mod) return;
  mod.name = name;
  renderModuleList();
  saveConfig();
}

// Inline rename module by double-clicking the name span
function startRenameModule(id, spanEl) {
  const inp = document.createElement('input');
  inp.className = 'mod-name-input';
  inp.value = getModule(id)?.name || '';
  inp.style.cssText = 'flex:1;background:#0a1830;color:#fff;border:1px solid #4a8af0;border-radius:2px;padding:1px 4px;font-size:12px;min-width:0';
  spanEl.replaceWith(inp);
  inp.focus(); inp.select();
  const save = () => { const m = getModule(id); if(m) m.name = inp.value||m.name; renderModuleList(); saveConfig(); };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); if(e.key==='Escape') renderModuleList(); });
}

// Update module-level property
function updateModProp(prop, val) {
  const mod = getSelectedModule();
  if (!mod) return;
  mod[prop] = val;
  renderAll();
  renderPropsPanel();
  saveConfig();
}

// Add element to current selected module
function addElementToModule(type) {
  const mod = getSelectedModule();
  if (!mod) return;
  const cw = appState.canvas.width;
  const modH = calcModuleHeight(mod);
  let el;
  if (type === 'title-bar') el = makeTitleBar(cw, 0, modH, 60);
  else if (type === 'text-box') el = makeTextBox(20, modH, cw - 40, 120);
  else if (type === 'text') el = makeText(20, modH, cw - 40, 40, '文字内容');
  else if (type === 'image') el = makeImg(20, modH, cw - 40, 200);
  if (!el) return;
  mod.elements.push(el);
  appState.selectedElementId = el.id;
  renderAll();
  renderPropsPanel();
  renderOverlay();
  saveConfig();
}

// Render element list in module panel
function renderModElementList(mod) {
  if (!mod || !mod.elements.length) return '<div style="color:#555;font-size:11px;padding:4px 0">无元素</div>';
  const typeLabels = {text:'文字',image:'图片',background:'背景','title-bar':'标题栏','text-box':'文本框'};
  const designTypes = new Set(['background', 'title-bar']);

  function isDesign(el) { return el._group === 'design' || (el._group !== 'content' && designTypes.has(el.type)); }
  function isContent(el) { return !isDesign(el); }

  function renderItem(el) {
    const active = el.id === appState.selectedElementId ? ' active' : '';
    return `<div class="mod-el-item${active}" onclick="selectElementById('${el.id}')">
      <span class="mod-el-type">${typeLabels[el.type]||el.type}</span>
      <span class="mod-el-name">${escHtml((el.text||el.type||'').substring(0,12))}</span>
      <button class="mod-el-mv" onclick="elMoveGroup('${el.id}','${isDesign(el)?'content':'design'}');event.stopPropagation()" title="移到另一组">⇄</button>
      <button class="mod-el-del" onclick="deleteElementById('${el.id}');event.stopPropagation()">✕</button>
    </div>`;
  }

  const designEls = mod.elements.filter(isDesign);
  const contentEls = mod.elements.filter(isContent);

  return `<div class="el-group">
    <div class="el-group-header">🎨 设计素材</div>
    ${designEls.map(renderItem).join('') || '<div class="el-group-empty">空</div>'}
    <button class="add-el-btn-sm" onclick="addElToGroup('design')">＋ 添加设计元素</button>
  </div>
  <div class="el-group">
    <div class="el-group-header">📝 内容素材</div>
    ${contentEls.map(renderItem).join('') || '<div class="el-group-empty">空</div>'}
    <button class="add-el-btn-sm" onclick="addElToGroup('content')">＋ 添加内容元素</button>
  </div>`;
}

function elMoveGroup(elId, toGroup) {
  const mod = getSelectedModule();
  if (!mod) return;
  const el = mod.elements.find(e => e.id === elId);
  if (el) { el._group = toGroup; renderPropsPanel(); saveConfig(); }
}

function addElToGroup(groupKey) {
  const mod = getSelectedModule();
  if (!mod) return;
  const type = groupKey === 'design' ? 'title-bar' : 'text-box';
  addElementToModule(type);
  const newEl = mod.elements[mod.elements.length - 1];
  if (newEl) newEl._group = groupKey;
  renderPropsPanel();
}

// Select element by id (from element list in module panel)
function selectElementById(elId) {
  const mod = getSelectedModule();
  if (!mod) return;
  const el = mod.elements.find(e => e.id === elId);
  if (!el) return;
  appState.selectedElementId = elId;
  renderPropsPanel();
  renderOverlay();
}

// Delete element by id
function deleteElementById(elId) {
  const mod = getSelectedModule();
  if (!mod) return;
  mod.elements = mod.elements.filter(e => e.id !== elId);
  if (appState.selectedElementId === elId) appState.selectedElementId = null;
  renderAll(); renderBlockView(); renderContentView();
  renderPropsPanel();
  renderOverlay();
  saveConfig();
}

// ===== 8. LEFT PANEL: ASSET MANAGEMENT =====
let assetCatActive = 'backgrounds';

function renderAssetPanel() {
  // Render into new asset-panel-inner (three-view layout)
  const panelInner = document.getElementById('asset-panel-inner');

  // Build tab bar html
  const tabHtml = ASSET_CATS.map(function(cat) {
    return '<button class="asset-cat-tab' + (cat.key===assetCatActive?' active':'') + '" onclick="assetCatActive=\'' + cat.key + '\';renderAssetPanel()">' + cat.label + '</button>';
  }).join('');

  // Determine where to render content
  let content;
  if (panelInner) {
    panelInner.innerHTML = '<div class="asset-cat-tabs" style="flex-wrap:wrap">' + tabHtml + '</div>';
    content = document.createElement('div');
    panelInner.appendChild(content);
  } else {
    // Legacy fallback
    const legacyTabs = document.getElementById('asset-cat-tabs');
    const legacyContent = document.getElementById('asset-cat-content');
    if (legacyTabs) legacyTabs.innerHTML = tabHtml;
    if (legacyContent) { legacyContent.innerHTML = ''; content = legacyContent; }
    else { content = document.createElement('div'); }
  }

  content.innerHTML = '';
  const cat = ASSET_CATS.find(c=>c.key===assetCatActive);
  if (!cat) return;

  if (cat.three) {
    // Three-segment groups
    const addBtn = document.createElement('button');
    addBtn.className = 'add-group-btn';
    addBtn.textContent = '+ 新建素材组';
    addBtn.onclick = () => addAssetGroup(cat.key);
    content.appendChild(addBtn);

    for (const grp of appState.assets[cat.key]) {
      content.appendChild(buildAssetGroupCard(cat.key, grp));
    }
  } else {
    // Single images
    const grid = document.createElement('div');
    grid.className = 'asset-single-grid';
    for (const item of appState.assets[cat.key]) {
      const div = document.createElement('div');
      div.className = 'asset-single-item';
      div.innerHTML = `
        <img src="${item.dataUrl||''}" alt="${escHtml(item.name)}">
        <div class="item-name">${escHtml(item.name)}</div>
        <button class="item-del" onclick="deleteSingleAsset('${cat.key}','${item.id}');event.stopPropagation()">✕</button>`;
      grid.appendChild(div);
    }
    content.appendChild(grid);

    const uploadBtn = document.createElement('button');
    uploadBtn.className = 'upload-single-btn';
    uploadBtn.textContent = '+ 上传图片';
    uploadBtn.onclick = () => uploadSingleAsset(cat.key);
    content.appendChild(uploadBtn);
  }
}

function buildAssetGroupCard(catKey, grp) {
  const card = document.createElement('div');
  card.className = 'asset-group-card';
  card.dataset.id = grp.id;

  const slots = ['head','mid','tail'];
  const slotLabels = ['头段','中段','尾段'];
  let slotsHtml = '<div class="asset-three-slots">';
  slots.forEach((slot, i) => {
    const img = grp[slot] ? `<img src="${grp[slot].dataUrl}" alt="">` : `<span style="font-size:18px;color:#555">+</span>`;
    const del = grp[slot] ? `<span class="slot-del" onclick="clearAssetSlot('${catKey}','${grp.id}','${slot}');event.stopPropagation()">✕</span>` : '';
    slotsHtml += `<div class="asset-slot" onclick="uploadAssetSlot('${catKey}','${grp.id}','${slot}')">${img}${del}<span class="slot-label">${slotLabels[i]}</span></div>`;
  });
  slotsHtml += '</div>';

  card.innerHTML = `
    <div class="asset-group-header">
      <input class="asset-group-name" value="${escHtml(grp.name)}" oninput="renameAssetGroup('${catKey}','${grp.id}',this.value)">
      <button class="asset-group-del" onclick="deleteAssetGroup('${catKey}','${grp.id}')">✕</button>
    </div>
    ${slotsHtml}
    <button class="upload-single-btn" onclick="applyAssetGroupToSelected('${catKey}','${grp.id}')" style="width:100%;margin-top:4px">✓ 应用到选中元素</button>`;
  return card;
}

function addAssetGroup(catKey) {
  const grp = {id:uid(), name:'新素材组', head:null, mid:null, tail:null};
  appState.assets[catKey].push(grp);
  saveConfig();
  renderAssetPanel();
}

function renameAssetGroup(catKey, grpId, name) {
  const grp = appState.assets[catKey].find(g=>g.id===grpId);
  if (grp) { grp.name = name; saveConfig(); }
}

async function uploadAssetSlot(catKey, grpId, slot) {
  const file = await pickFile('image/*');
  if (!file) return;
  const dataUrl = await fileToDataUrl(file);
  const grp = appState.assets[catKey].find(g=>g.id===grpId);
  if (!grp) return;
  grp[slot] = {dataUrl};
  // Cache it
  const cacheKey = dataUrl.substring(0, 80);
  delete imgCache[cacheKey]; // force reload
  await saveAssetData(grpId + '_' + slot, dataUrl);
  saveConfig();
  console.log(`[素材上传] ${catKey} / 组 ${grpId} / ${slot} 上传完成`);
  renderAssetPanel();
  renderAll();
}

function clearAssetSlot(catKey, grpId, slot) {
  const grp = appState.assets[catKey].find(g=>g.id===grpId);
  if (!grp) return;
  if (grp[slot]) {
    const cacheKey = (grp[slot].dataUrl||'').substring(0,80);
    delete imgCache[cacheKey];
  }
  grp[slot] = null;
  deleteAssetData(grpId+'_'+slot);
  saveConfig();
  renderAssetPanel();
  renderAll();
}

function deleteAssetGroup(catKey, grpId) {
  if (!confirm('删除该素材组？')) return;
  const arr = appState.assets[catKey];
  const idx = arr.findIndex(g=>g.id===grpId);
  if (idx>=0) {
    const grp = arr[idx];
    for (const slot of ['head','mid','tail']) { if(grp[slot]) deleteAssetData(grpId+'_'+slot); }
    arr.splice(idx,1);
  }
  saveConfig(); renderAssetPanel(); renderAll();
}

function applyAssetGroupToSelected(catKey, groupId) {
  const el = getSelectedElement();
  if (!el) { alert('请先选中一个元素'); return; }
  if (catKey === 'backgrounds' && el.type === 'background') {
    el.bgType = 'three-segment';
    el.bgAssetGroupId = groupId;
  } else if ((catKey === 'titleBars' && el.type === 'title-bar') || (catKey === 'textBoxes' && el.type === 'text-box')) {
    el.assetGroupId = groupId;
  } else {
    alert('素材类型与选中元素不匹配');
    return;
  }
  renderAll(); renderPropsPanel(); saveConfig();
}

async function uploadSingleAsset(catKey) {
  const file = await pickFile('image/*');
  if (!file) return;
  const dataUrl = await fileToDataUrl(file);
  const id = uid();
  const name = file.name.replace(/\.[^.]+$/,'');
  appState.assets[catKey].push({id, name, dataUrl});
  await saveAssetData(id, dataUrl);
  saveConfig(); renderAssetPanel();
}

function deleteSingleAsset(catKey, assetId) {
  const arr = appState.assets[catKey];
  const idx = arr.findIndex(a=>a.id===assetId);
  if (idx>=0) { deleteAssetData(assetId); arr.splice(idx,1); }
  saveConfig(); renderAssetPanel();
}

  }

  panel.innerHTML = html;

  // Bind textarea with input event (important!)

// Update only transform inputs without re-rendering full panel
function updatePropsTransform() {
  const el = getSelectedElement();
  if (!el) return;
  const xEl = document.getElementById('px-x');
  const yEl = document.getElementById('px-y');
  const wEl = document.getElementById('px-w');
  const hEl = document.getElementById('px-h');
  if (xEl) xEl.value = el.x;
  if (yEl) yEl.value = el.y;
  if (wEl) wEl.value = el.width;
  if (hEl) hEl.value = el.height;
}

function updateEl(prop, val) {
  const el = getSelectedElement();
  if (!el) return;
  el[prop] = val;
  renderAll();
  // Re-render panel for props that change the panel structure
  if (['bgType','textEffect'].includes(prop)) renderPropsPanel();
  saveConfig();
}

function stepEl(prop, delta, e) {
  const step = e.shiftKey ? 10 : 1;
  const el = getSelectedElement();
  if (!el) return;
  const cur = parseFloat(el[prop]) || 0;
  el[prop] = Math.round((cur + delta * step) * 1000) / 1000;
  renderAll();
  updatePropsTransform();
  renderPropsPanel();
  renderOverlay();
  saveConfig();
}

function updatePadding(side, val) {
  const el = getSelectedElement();
  if (!el) return;
  if (!el.padding) el.padding = {top:8,right:12,bottom:8,left:12};
  el.padding[side] = val;
  renderAll(); saveConfig();
}

function updateTextEffect(type) {
  const el = getSelectedElement();
  if (!el) return;
  if (!type) { el.textEffect = null; }
  else if (type === 'shadow') { el.textEffect = {type:'shadow', color:'rgba(0,0,0,0.6)', blur:6, dx:2, dy:2}; }
  else if (type === 'stroke') { el.textEffect = {type:'stroke', strokeColor:'#000000', strokeWidth:2}; }
  else if (type === 'gradient') { el.textEffect = {type:'gradient', gradColor1:'#ffcc00', gradColor2:'#ff4400'}; }
  renderPropsPanel(); renderAll(); saveConfig();
}

function updateTextEffectProp(prop, val) {
  const el = getSelectedElement();
  if (!el || !el.textEffect) return;
  el.textEffect[prop] = val;
  renderAll(); saveConfig();
}

async function uploadImageDirect() {
  const file = await pickFile('image/*');
  if (!file) return;
  const dataUrl = await fileToDataUrl(file);
  const id = uid();
  const name = file.name.replace(/\.[^.]+$/, '');
  appState.assets.images.push({id, name, dataUrl});
  await saveAssetData(id, dataUrl);
  const el = getSelectedElement();
  if (el) { el.assetId = id; renderAll(); renderPropsPanel(); saveConfig(); }
  renderAssetPanel();
}

function alignEl(dir) {
  const el = getSelectedElement();
  const mod = getSelectedModule();
  if (!el || !mod) return;
  const cw = appState.canvas.width;
  const mInfo = moduleYMap[mod.id] || {height:calcModuleHeight(mod)};
  const mh = mInfo.height;
  if (dir==='left')   el.x = 0;
  if (dir==='cx')     el.x = Math.round((cw - el.width)/2);
  if (dir==='right')  el.x = cw - el.width;
  if (dir==='top')    el.y = 0;
  if (dir==='cy')     el.y = Math.round((mh - el.height)/2);
  if (dir==='bottom') el.y = mh - el.height;
  renderAll(); updatePropsTransform(); saveConfig();
}

function layerOp(op) {
  const el = getSelectedElement();
  const mod = getSelectedModule();
  if (!el || !mod) return;
  const els = mod.elements;
  const sorted = [...els].sort((a,b)=>(a.zIndex||0)-(b.zIndex||0));
  const myZ = el.zIndex||0;
  if (op==='up')     { const above = sorted.filter(e=>e.id!==el.id&&(e.zIndex||0)>myZ); if(above.length) { el.zIndex=(above[0].zIndex||0)+1; } }
  if (op==='down')   { const below = sorted.filter(e=>e.id!==el.id&&(e.zIndex||0)<myZ); if(below.length) { const last=below[below.length-1]; el.zIndex=(last.zIndex||0)-1; } }
  if (op==='top')    { el.zIndex = Math.max(0,...els.map(e=>e.zIndex||0)) + 1; }
  if (op==='bottom') { el.zIndex = Math.min(0,...els.map(e=>e.zIndex||0)) - 1; }
  renderAll(); saveConfig();
}

function renderSliceOverlay() {
  const overlay = document.getElementById('slice-overlay');
  overlay.innerHTML = '';
  if (!appState.sliceMode) return;
  for (let i = 0; i < appState.sliceLines.length; i++) {
    const y = appState.sliceLines[i];
    const line = document.createElement('div');
    line.className = 'slice-line';
    line.style.top = y + 'px';
    line.dataset.y = y + 'px';
    line.dataset.idx = i;
    // Drag slice line
    let startY, origY;
    line.addEventListener('mousedown', e => {
      startY = e.clientY; origY = y;
      const onMove = mv => {
        const rect = overlayCanvas.getBoundingClientRect();
        const scale = overlayCanvas.height / rect.height;
        const newY = Math.round(origY + (mv.clientY - startY) * scale);
        appState.sliceLines[i] = clamp(newY, 0, mainCanvas.height);
        appState.sliceLines.sort((a,b)=>a-b);
        renderSliceOverlay();
      };
      const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); saveConfig(); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      e.stopPropagation();
    });
    overlay.appendChild(line);
  }
  // Pointer events on overlay
  overlay.style.pointerEvents = appState.sliceMode ? 'auto' : 'none';
}

function clearAll() {
  if (!confirm('清除所有内容？')) return;
  appState.modules = [];
