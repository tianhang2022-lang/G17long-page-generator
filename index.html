<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 长图生成器</title>
<script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/toolbar.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/canvas.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body>
<!-- TOOLBAR -->
<div id="toolbar">
  <span class="logo">🎮 长图生成器</span>
  <a href="projects.html" class="tb-btn" style="text-decoration:none;font-size:14px" title="项目管理">🏠</a>
  <div class="sep"></div>
  <span id="project-name-display" style="font-size:11px;color:#6a90c0;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" ondblclick="renameCurrentProject()" title="双击重命名项目">未命名项目</span>
  <button class="tb-btn" onclick="saveCurrentProject()" title="保存项目 (Ctrl+S)" style="color:#4aff90;border-color:#1a4a2a">💾 保存</button>
  <div class="sep"></div>
  <button class="tb-btn" style="padding:2px 8px" onclick="setEditorZoom(appState.zoom-0.1)" title="缩小">－</button>
  <span id="zoom-label" style="font-size:11px;color:#c0c8e0;min-width:40px;text-align:center;display:inline-block">100%</span>
  <button class="tb-btn" style="padding:2px 8px" onclick="setEditorZoom(appState.zoom+0.1)" title="放大">＋</button>
  <button class="tb-btn" style="padding:2px 8px" onclick="setEditorZoom(1)" title="重置">⟳</button>
  <button class="tb-btn" id="btn-undo" onclick="historyUndo()" title="撤销 Ctrl+Z" disabled>↩ 撤销</button>
  <button class="tb-btn" id="btn-redo" onclick="historyRedo()" title="重做 Ctrl+Y" disabled>↪ 重做</button>
  <span id="history-info" style="font-size:11px;color:#556;min-width:30px;text-align:center">0/0</span>
  <div class="sep"></div>
  <button class="tb-btn" onclick="triggerImport()" title="导入模板文件(.md/.json)">📂 导入</button>
  <input type="file" id="import-file-input" accept=".md,.json" style="display:none" onchange="handleImportFile(this)">
  <button class="tb-btn" onclick="exportProjectJSON()" title="导出为 JSON 模板">💾 模板</button>
  <div class="sep"></div>
  <button class="tb-btn active" id="btn-guides" onclick="toggleGuides()">📏 辅助线</button>
  <button class="tb-btn" id="btn-preview" onclick="togglePreview()" title="全屏预览 (P)">👁 预览</button>
  <button class="tb-btn" id="btn-slice" onclick="toggleSliceMode()">✂️ 切图</button>
  <div class="spacer"></div>
  <button class="tb-btn export" onclick="exportPNG()">📥 PNG</button>
  <button class="tb-btn export" onclick="exportPDF()">📄 PDF</button>
  <button class="tb-btn export" onclick="exportZipSlices()">🗂️ 切片</button>
  <div class="sep"></div>
  <button class="tb-btn danger" onclick="clearAll()">🗑️ 清除</button>
</div>

<!-- SLICE MODE BAR -->
<div id="slice-mode-bar" class="hidden">
  <span>✂️ 切图模式</span>
  <span class="slice-info">点击画布添加切割线，拖拽调整位置</span>
  <button class="tb-btn" onclick="clearSliceLines()">清除切割线</button>
  <button class="tb-btn active" onclick="toggleSliceMode()">退出切图</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- LEFT PANEL -->
  <div id="left-panel">
    <!-- 图标导航栏 -->
    <div id="left-nav">
      <button class="nav-btn active" id="nav-page" onclick="setView('page')" title="页面设计">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
        <span>页面</span>
      </button>
      <button class="nav-btn" id="nav-block" onclick="setView('block')" title="模块设计">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
        <span>模块</span>
      </button>
      <button class="nav-btn" id="nav-content" onclick="setView('content')" title="内容填充">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
        <span>内容</span>
      </button>
      <button class="nav-btn" id="nav-assets" onclick="setView('assets')" title="素材库">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        <span>素材</span>
      </button>
    </div>

    <!-- 视图内容区 -->
    <div id="left-content">

      <!-- ① 页面设计视图 -->
      <div class="view-panel" id="view-page">
        <div class="view-title">🖼 页面设计</div>
        <div class="view-section">
          <div class="section-label">画布尺寸</div>
          <div class="row-btns">
            <button class="size-btn" onclick="setCanvasWidth(750)">750px</button>
            <button class="size-btn" onclick="setCanvasWidth(1080)">1080px</button>
          </div>
        </div>
        <div class="view-section">
          <div class="section-label">页面背景</div>
          <div class="bg-options">
            <label class="radio-opt"><input type="radio" name="page-bg" value="color" onchange="setPageBg('color')" checked> 纯色</label>
            <label class="radio-opt"><input type="radio" name="page-bg" value="gradient" onchange="setPageBg('gradient')"> 渐变</label>
            <label class="radio-opt"><input type="radio" name="page-bg" value="image" onchange="setPageBg('image')"> 图片</label>
          </div>
          <div id="page-bg-color-ctrl">
            <input type="color" class="full-color" value="#0a0a18" oninput="updatePageBgColor(this.value)" title="背景颜色">
            <div id="page-bg-gradient-extra" class="hidden" style="margin-top:4px">
              <label style="font-size:10px;color:#4a6080">渐变终止色</label>
              <input type="color" class="full-color" value="#000000" oninput="updatePageBgColor2(this.value)" title="渐变终止颜色">
            </div>
          </div>
          <div id="page-bg-image-ctrl" class="hidden">
            <button class="upload-btn" onclick="uploadPageBgImage()">📁 上传背景图</button>
            <div id="page-bg-preview"></div>
          </div>
        </div>
        <div class="view-section">
          <div class="section-label">页面边距</div>
          <div class="margin-grid">
            <span></span>
            <input class="mg-num" type="number" id="pg-mt" value="0" onchange="updatePageMargin('top',+this.value)" placeholder="上">
            <span></span>
            <input class="mg-num" type="number" id="pg-ml" value="0" onchange="updatePageMargin('left',+this.value)" placeholder="左">
            <div class="mg-center">边距</div>
            <input class="mg-num" type="number" id="pg-mr" value="0" onchange="updatePageMargin('right',+this.value)" placeholder="右">
            <span></span>
            <input class="mg-num" type="number" id="pg-mb" value="0" onchange="updatePageMargin('bottom',+this.value)" placeholder="下">
            <span></span>
          </div>
        </div>
        <div class="view-section">
          <div class="section-label">模块列表</div>
          <div id="page-module-list"></div>
          <button class="add-mod-btn" onclick="showTemplateModal()">＋ 添加模块</button>
        </div>
      </div>

      <!-- ② 模块设计视图 -->
      <div class="view-panel hidden" id="view-block">
        <div class="view-title">📦 模块设计</div>
        <div id="block-no-select" class="hint-text">点击左侧模块列表中的模块进行设计</div>
        <div id="block-design-panel" class="hidden">
          <div class="view-section">
            <div class="section-label">选中模块</div>
            <div id="block-name-row" class="name-row">
              <span id="block-name-display" ondblclick="startRenameBlock(this)">模块名</span>
            </div>
          </div>
          <div class="view-section">
            <div class="section-label">预设模板</div>
            <div class="preset-grid" id="block-presets">
              <button class="preset-btn" onclick="applyBlockPreset('title-text')">标题+文字</button>
              <button class="preset-btn" onclick="applyBlockPreset('title-image-text')">标题+图文</button>
              <button class="preset-btn" onclick="applyBlockPreset('image-only')">纯图片</button>
              <button class="preset-btn" onclick="applyBlockPreset('text-only')">纯文字</button>
            </div>
          </div>
          <div class="view-section">
            <div class="section-label">模块高度</div>
            <div class="row-inline">
              <label class="props-check"><input type="checkbox" id="block-auto-h" onchange="updateBlockProp('autoHeight',this.checked)"> 自适应</label>
              <input class="mg-num" type="number" id="block-fixed-h" value="300" onchange="updateBlockProp('fixedHeight',+this.value)" style="margin-left:8px">
              <span style="font-size:10px;color:#4a6080">px</span>
            </div>
          </div>
          <div class="view-section">
            <div class="section-label">模块边距</div>
            <div class="margin-grid">
              <span></span>
              <input class="mg-num" type="number" id="blk-pt" value="0" onchange="updateBlockProp('paddingTop',+this.value)">
              <span></span>
              <input class="mg-num" type="number" id="blk-pl" value="0" onchange="updateBlockProp('paddingLeft',+this.value)">
              <div class="mg-center">内边距</div>
              <input class="mg-num" type="number" id="blk-pr" value="0" onchange="updateBlockProp('paddingRight',+this.value)">
              <span></span>
              <input class="mg-num" type="number" id="blk-pb" value="0" onchange="updateBlockProp('paddingBottom',+this.value)">
              <span></span>
            </div>
            <div class="row-inline" style="margin-top:6px">
              <span class="section-label" style="margin:0">模块间距</span>
              <input class="mg-num" type="number" id="blk-mt" value="0" onchange="updateBlockProp('marginTop',+this.value)">
              <span style="font-size:10px;color:#4a6080;margin:0 3px">↑</span>
              <input class="mg-num" type="number" id="blk-mb" value="0" onchange="updateBlockProp('marginBottom',+this.value)">
              <span style="font-size:10px;color:#4a6080">↓</span>
            </div>
          </div>
          <div class="view-section">
            <div class="section-label">设计元素</div>
            <div id="block-design-els"></div>
            <div class="row-btns" style="margin-top:4px">
              <button class="add-el-btn" onclick="addElementToModule('title-bar')">＋ 标题栏</button>
              <button class="add-el-btn" onclick="addElementToModule('background')">＋ 背景</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ③ 内容填充视图 -->
      <div class="view-panel hidden" id="view-content">
        <div class="view-title">📝 内容填充</div>
        <div id="content-no-select" class="hint-text">先在模块列表中选择模块</div>
        <div id="content-fill-panel" class="hidden">
          <div class="view-section">
            <div class="section-label">内容元素</div>
            <div id="content-els-list"></div>
            <div class="row-btns" style="margin-top:4px">
              <button class="add-el-btn" onclick="addElementToModule('text-box')">＋ 文本框</button>
              <button class="add-el-btn" onclick="addElementToModule('text')">＋ 文字</button>
              <button class="add-el-btn" onclick="addElementToModule('image')">＋ 图片</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ④ 素材库视图 -->
      <div class="view-panel hidden" id="view-assets">
        <div class="view-title">🗂 素材库</div>
        <div class="asset-tabs">
          <button class="asset-tab active" onclick="switchAssetTab('design',this)">🎨 设计素材</button>
          <button class="asset-tab" onclick="switchAssetTab('content',this)">📝 内容素材</button>
        </div>
        <div id="asset-tab-design">
          <div id="asset-panel-inner"></div>
        </div>
        <div id="asset-tab-content" class="hidden">
          <div id="content-asset-list"></div>
          <button class="upload-btn" onclick="uploadContentAsset()">＋ 上传内容图片</button>
        </div>
      </div>

    </div><!-- end left-content -->
  </div><!-- end left-panel -->

  <!-- CANVAS AREA -->
  <div id="canvas-area">
    <div id="canvas-inner">
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div id="slice-overlay"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div id="props-panel">
      <div class="no-select-hint">👈 选择左侧模块<br>再点击画布中的元素<br>在此编辑属性</div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-backdrop hidden" id="modal-template">
  <div class="modal">
    <div class="modal-title">选择布局模板 <button class="modal-close" onclick="hideModal('modal-template')">✕</button></div>
    <div class="template-grid" id="template-grid"></div>
  </div>
</div>

<div class="modal-backdrop hidden" id="modal-asset-picker">
  <div class="modal">
    <div class="modal-title" id="asset-picker-title">选择素材 <button class="modal-close" onclick="hideModal('modal-asset-picker')">✕</button></div>
    <div id="asset-picker-content"></div>
    <div style="margin-top:12px;display:flex;justify-content:flex-end;gap:8px">
      <button class="tb-btn" onclick="hideModal('modal-asset-picker')">取消</button>
      <button class="tb-btn active" onclick="confirmAssetPick()">确认选择</button>
    </div>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/elements.js"></script>
<script src="js/history.js"></script>
<script src="js/render.js"></script>
<script src="js/interact.js"></script>
<script src="js/storage.js"></script>
<script src="js/panels.js"></script>
<script src="js/import-export.js"></script>
<script src="js/main.js"></script>

<div id="preview-overlay" class="hidden">
  <div id="preview-header">
    <span style="font-weight:bold">👁 预览模式</span>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="pv-btn" onclick="previewZoom(-0.1)">－</button>
      <span id="preview-zoom-label" style="min-width:44px;text-align:center">100%</span>
      <button class="pv-btn" onclick="previewZoom(0.1)">＋</button>
      <button class="pv-btn" onclick="previewFit()">适应窗口</button>
      <button class="pv-btn" onclick="togglePreview()">✕ 退出</button>
    </div>
  </div>
  <div id="preview-body">
    <div id="preview-inner">
      <canvas id="preview-canvas"></canvas>
    </div>
  </div>
  <div id="preview-footer">按 ESC 退出 · Ctrl+滚轮缩放</div>
</div>
</body>
</html>
