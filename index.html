function applyCanvasScale() {
  const area = document.getElementById('canvas-area');
  const inner = document.getElementById('canvas-inner');
  const areaW = area.clientWidth - 40;
  const cw = appState.canvas.width;
  let scale = 1;
  if (cw > areaW) scale = areaW / cw;
  inner.style.transform = `scale(${scale})`;
  inner.style.width = cw + 'px';
  // Fix the area for scrolling
  const scaledH = mainCanvas.height * scale;
  inner.style.marginBottom = (scaledH - mainCanvas.height) + 'px';
}

function setEditorZoom(z) {
  appState.zoom = Math.max(0.25, Math.min(3, parseFloat(z.toFixed(2))));
  const inner = document.getElementById('canvas-inner');
  if (inner) {
    inner.style.transform = `scale(${appState.zoom})`;
    inner.style.transformOrigin = 'top center';
  }
  const lbl = document.getElementById('zoom-label');
  if (lbl) lbl.textContent = Math.round(appState.zoom * 100) + '%';
}

// ===== THREE-VIEW SYSTEM =====
function setView(view) {
  appState.view = view;
  // Sync mode for backward compatibility
  if (view === 'block') appState.mode = 'design';
  else if (view === 'content') appState.mode = 'content';
  // Update nav buttons
  ['page','block','content','assets'].forEach(function(v) {
    const btn = document.getElementById('nav-'+v);
    if (btn) btn.classList.toggle('active', v === view);
  });
  // Show/hide view panels
  ['page','block','content','assets'].forEach(function(v) {
    const panel = document.getElementById('view-'+v);
    if (panel) panel.classList.toggle('hidden', v !== view);
  });
  // Update canvas interaction mode
  if (view === 'page') {
    appState.selectedElementId = null;
  }
  // Refresh all panels
  renderPageView();
  renderBlockView();
  renderContentView();
  renderPropsPanel();
  renderOverlay();
  renderAll();
  if (view === 'assets') { setTimeout(() => renderAssetPanel(), 50); }
}

function renderPageView() {
  const listEl = document.getElementById('page-module-list');
  if (!listEl) return;
  listEl.innerHTML = appState.modules.map(function(mod, i) {
    return '<div class="mod-card' + (mod.id===appState.selectedModuleId?' active':'') + '" onclick="selectModuleInView(\'' + mod.id + '\')">'
      + '<span class="mod-seq">' + (i+1) + '</span>'
      + '<span class="mod-label">' + escHtml(mod.name||'模块') + '</span>'
      + '<button class="mod-del" onclick="deleteModule(\'' + mod.id + '\');event.stopPropagation()">✕</button>'
      + '</div>';
  }).join('');
  // Restore page bg control state
  const bg = appState.pageBg || {type:'color',color:'#0a0a18'};
  const radios = document.querySelectorAll('input[name="page-bg"]');
  radios.forEach(function(r) { r.checked = r.value === bg.type; });
  togglePageBgCtrl(bg.type);
  if (bg.color) { const c = document.querySelector('#page-bg-color-ctrl input'); if(c) c.value = bg.color; }
  // Page margins
  const m = appState.pageMargin || {top:0,right:0,bottom:0,left:0};
  ['top','right','bottom','left'].forEach(function(d) {
    const el = document.getElementById('pg-m'+d[0]);
    if (el) el.value = m[d]||0;
  });
}

function renderBlockView() {
  const mod = getSelectedModule();
  const noSel = document.getElementById('block-no-select');
  const panel = document.getElementById('block-design-panel');
  if (noSel) noSel.classList.toggle('hidden', !!mod);
  if (panel) panel.classList.toggle('hidden', !mod);
  if (!mod) return;
  // Update name
  const nameEl = document.getElementById('block-name-display');
  if (nameEl) nameEl.textContent = mod.name||'模块';
  // Update height controls
  const autoH = document.getElementById('block-auto-h');
  const fixedH = document.getElementById('block-fixed-h');
  if (autoH) autoH.checked = !!mod.autoHeight;
  if (fixedH) { fixedH.value = mod.fixedHeight||300; fixedH.disabled = !!mod.autoHeight; }
  // Update padding/margin inputs
  var propMap = {pt:'paddingTop',pr:'paddingRight',pb:'paddingBottom',pl:'paddingLeft'};
  ['pt','pr','pb','pl'].forEach(function(k) {
    const inp = document.getElementById('blk-'+k);
    if (inp) inp.value = mod[propMap[k]]||0;
  });
  var marginMap = {mt:'marginTop',mb:'marginBottom'};
  ['mt','mb'].forEach(function(k) {
    const inp = document.getElementById('blk-'+k);
    if (inp) inp.value = mod[marginMap[k]]||0;
  });
  // Design elements list
  const typeLabels = {background:'背景','title-bar':'标题栏'};
  const designEls = mod.elements.filter(function(e) { return isDesignEl(e); });
  const designList = document.getElementById('block-design-els');
  if (designList) {
    if (designEls.length === 0) {
      designList.innerHTML = '<div class="hint-text" style="padding:6px">无设计元素</div>';
    } else {
      designList.innerHTML = designEls.map(function(el) {
        return '<div class="mod-el-item' + (el.id===appState.selectedElementId?' active':'') + '" onclick="selectElInView(\'' + mod.id + '\',\'' + el.id + '\')">'
          + '<span class="mod-el-type">' + (typeLabels[el.type]||el.type) + '</span>'
          + '<span class="mod-el-name">' + escHtml((el.text||el.type).substring(0,10)) + '</span>'
          + '<button class="mod-el-del" onclick="deleteElementById(\'' + el.id + '\');event.stopPropagation()">✕</button>'
          + '</div>';
      }).join('');
    }
  }
}

function renderContentView() {
  const mod = getSelectedModule();
  const noSel = document.getElementById('content-no-select');
  const fillPanel = document.getElementById('content-fill-panel');
  if (noSel) noSel.classList.toggle('hidden', !!mod);
  if (fillPanel) fillPanel.classList.toggle('hidden', !mod);
  if (!mod) return;
  const typeLabels = {text:'文字',image:'图片','text-box':'文本框'};
  const contentEls = mod.elements.filter(function(e) { return isContentEl(e); });
  const list = document.getElementById('content-els-list');
  if (list) {
    if (contentEls.length === 0) {
      list.innerHTML = '<div class="hint-text" style="padding:6px">无内容元素</div>';
    } else {
      list.innerHTML = contentEls.map(function(el) {
        return '<div class="mod-el-item' + (el.id===appState.selectedElementId?' active':'') + '" onclick="selectElInView(\'' + mod.id + '\',\'' + el.id + '\')">'
          + '<span class="mod-el-type">' + (typeLabels[el.type]||el.type) + '</span>'
          + '<span class="mod-el-name">' + escHtml((el.text||el.type||'').substring(0,10)) + '</span>'
          + '<button class="mod-el-del" onclick="deleteElementById(\'' + el.id + '\');event.stopPropagation()">✕</button>'
          + '</div>';
      }).join('');
    }
  }
}

function selectModuleInView(modId) {
  selectModule(modId);
  appState.selectedElementId = null;
  renderBlockView();
  renderContentView();
  renderPropsPanel();
  renderOverlay();
}

function selectElInView(modId, elId) {

  renderContentView();
  renderPropsPanel();

function switchAssetTab(tab, btn) {

// Page background

  togglePageBgCtrl(type);

function togglePageBgCtrl(type) {

function updatePageBgColor(val) {

  appState.bgColor = val;

}

function updatePageMargin(dir, val) {

async function uploadPageBgImage() {

  if (!file) return;

async function uploadContentAsset() {
  const file = await pickFile('image/*');
  if (!file) return;
  const dataUrl = await fileToDataUrl(file);
  const id = uid();
  const name = file.name.replace(/\.[^.]+$/, '');

}

function startRenameBlock(el) {
  const mod = getSelectedModule();
  if (!mod) return;
  const inp = document.createElement('input');
  inp.value = mod.name||'';
  inp.style.cssText = 'width:100%;background:transparent;color:#c0c8e0;border:none;outline:none;font-size:12px';
  el.replaceWith(inp);
  inp.focus(); inp.select();
  const save = function() { if(mod) mod.name=inp.value||mod.name; renderPageView(); renderModuleList(); saveConfig(); inp.replaceWith(el); el.textContent=mod.name; };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', function(e) { if(e.key==='Enter') inp.blur(); });

function applyBlockPreset(preset) {
  const mod = getSelectedModule();
  if (!mod) return;
  const cw = appState.canvas.width;
  const newEls = [];
  if (preset === 'title-text') {
    newEls.push(makeBg(cw, 300));
    newEls.push(makeTitleBar(cw, 0, 0, 60));
  } else if (preset === 'title-image-text') {
    newEls.push(makeBg(cw, 400));
    newEls.push(makeTitleBar(cw, 0, 0, 60));
    newEls.push(makeImg(20, 70, cw-40, 200));
  } else if (preset === 'image-only') {
    newEls.push(makeBg(cw, 300));
    newEls.push(makeImg(0, 0, cw, 300));
  } else if (preset === 'text-only') {
    newEls.push(makeBg(cw, 200));
  }
  if (newEls.length && confirm('应用预设将替换当前模块元素，确定吗？')) {
    mod.elements = newEls;
    renderAll(); renderBlockView(); renderPropsPanel(); saveConfig();
  }
}

function updateBlockProp(prop, val) {
  const mod = getSelectedModule();
  if (!mod) return;
  mod[prop] = val;
  renderAll(); renderBlockView(); saveConfig();
}

// ===== EDITOR MODE =====
function isDesignEl(el) {
  if (!el) return false;
  if (el._group === 'design') return true;
  if (el._group === 'content') return false;
  return el.type === 'background' || el.type === 'title-bar';
}

function isContentEl(el) {
  return !isDesignEl(el);
}

function setEditorMode(mode) {
  appState.mode = mode;
  // Update button states
  const d = document.getElementById('mode-btn-design');
  if(d) d.classList.toggle('active', mode === 'design');
  const c = document.getElementById('mode-btn-content');
  if(c) c.classList.toggle('active', mode === 'content');
  // Clear selection when switching modes
  appState.selectedElementId = null;
  renderAll();
  renderPropsPanel();
  renderOverlay();
  // Update left panel
  renderModuleList();
}

// ===== 14. EXPORT =====

// ===== IMPORT / EXPORT TEMPLATE =====
function triggerImport() {
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-file-input').click();
}

async function handleImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    if (file.name.endsWith('.md')) {
      importFromMarkdown(text);
    } else {
      importFromJSON(JSON.parse(text));
    }
  } catch(e) {
    alert('导入失败：' + e.message);
  }
}

function importFromMarkdown(mdText) {
  const lines = mdText.split('\n');
  const newModules = [];
  let currentMod = null;
  let bodyLines = [];
  const cw = appState.canvas.width;

  function flushBody() {
    if (!currentMod || !bodyLines.length) { bodyLines = []; return; }
    const body = bodyLines.join('\n').trim();
    if (body) {
      const el = makeTextBox(20, 90, cw - 40, 120);
      el.text = body;
      currentMod.elements.push(el);
    }
    bodyLines = [];
  }

  function newModule(titleText) {
    flushBody();
    const modId = uid();
    const bg = makeBg(cw, 300);
    const tb = makeTitleBar(cw, 0, 0, 60);
    tb.text = titleText || '新模块';
    const mod = {
      id: modId,
      name: titleText || '新模块',
      autoHeight: true,
      fixedHeight: 300,
      marginTop: 0,
      marginBottom: 0,
      elements: [bg, tb]
    };
    currentMod = mod;
    newModules.push(mod);
  }

  for (const rawLine of lines) {
    const line = rawLine.trimEnd();
    if (line.startsWith('# ')) {
      newModule(line.slice(2).trim());
    } else if (line.startsWith('## ')) {
      flushBody();
      if (!currentMod) newModule(line.slice(3).trim());
      else {
        const el = makeText(20, 90, cw - 40, 36, line.slice(3).trim());
        el.fontSize = 20; el.bold = true;
        currentMod.elements.push(el);
      }
    } else if (line.trim() === '---') {
      flushBody();
      currentMod = null;
    } else {
      if (!currentMod) newModule('模块');
      bodyLines.push(line);
    }
  }
  flushBody();

  if (!newModules.length) { alert('未解析到任何模块，请检查 Markdown 格式\n\n格式示例：\n# 标题\n正文内容\n---\n# 第二个标题'); return; }
  const doAppend = confirm('解析到 ' + newModules.length + ' 个模块\n\n点确定：追加到当前页面\n点取消：替换全部内容');
  if (doAppend) {
    appState.modules.push(...newModules);
  } else {
    appState.modules = newModules;
  }
  renderAll(); renderModuleList(); renderPropsPanel(); saveConfig();
  alert('✅ 导入成功：' + newModules.length + ' 个模块');
}

function importFromJSON(data) {
  let modules = Array.isArray(data) ? data : (data.modules || null);
  if (!modules) throw new Error('JSON 格式无效，需包含 modules 数组');
  modules = modules.map(mod => {
    mod.id = mod.id || uid();
    mod.elements = (mod.elements || []).map(el => { el.id = el.id || uid(); return el; });
    return mod;
  });
  const doAppend = confirm('检测到 ' + modules.length + ' 个模块\n\n点确定：追加到当前页面\n点取消：替换全部内容');
  if (doAppend) {
    appState.modules.push(...modules);
  } else {
    appState.modules = modules;
  }
  renderAll(); renderModuleList(); renderPropsPanel(); saveConfig();
  alert('✅ 导入成功：' + modules.length + ' 个模块');
}

function exportProjectJSON() {
  const data = { version: '1.0', name: '未命名项目', exportedAt: new Date().toISOString(), modules: appState.modules };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  downloadBlob(blob, 'longpage-template.json');
}

// ===== PREVIEW MODE =====
let _pvScale = 1.0;

async function togglePreview() {
  const overlay = document.getElementById('preview-overlay');
  if (!overlay.classList.contains('hidden')) {
    overlay.classList.add('hidden');
    return;
  }
  await renderAll();
  const pc = document.getElementById('preview-canvas');
  pc.width = mainCanvas.width;
  pc.height = mainCanvas.height;
  pc.getContext('2d').drawImage(mainCanvas, 0, 0);
  overlay.classList.remove('hidden');
  previewFit();
}

function previewFit() {
  const body = document.getElementById('preview-body');
  const pc = document.getElementById('preview-canvas');
  if (!body || !pc) return;
  const availW = body.clientWidth - 60;
  const availH = body.clientHeight - 60;
  _pvScale = Math.min(availW / (pc.width||1), availH / (pc.height||1), 1.5);
  applyPvScale();
}

function previewZoom(delta) {
  _pvScale = Math.max(0.2, Math.min(3, _pvScale + delta));
  applyPvScale();
}

function applyPvScale() {
  const inner = document.getElementById('preview-inner');
  if (inner) inner.style.transform = 'scale(' + _pvScale + ')';
  const lbl = document.getElementById('preview-zoom-label');
  if (lbl) lbl.textContent = Math.round(_pvScale * 100) + '%';
}

async function exportPNG() {
  await renderAll();
  mainCanvas.toBlob(blob => { if(blob) downloadBlob(blob, 'longpage.png'); }, 'image/png');
}

async function exportPDF() {
  await renderAll();
  const dataUrl = mainCanvas.toDataURL('image/jpeg', 0.92);
  const w = mainCanvas.width, h = mainCanvas.height;
  // A4 = 595 × 842 pt
  const pdfW = 595, pageH = 842;
  const imgW = pdfW;
  const imgH = Math.round(h / w * pdfW);
  try {
    const { jsPDF } = window.jspdf;
    let y = 0;
    let remaining = imgH;
    const doc = new jsPDF({orientation:'portrait', unit:'pt', format:'a4'});
    let pageNum = 0;
    while (remaining > 0) {
      if (pageNum > 0) doc.addPage();
      const pageImgH = Math.min(remaining, pageH);
      // crop portion
      const srcY = Math.round(y / imgH * h);
      const srcH = Math.round(pageImgH / imgH * h);
      const tmpC = document.createElement('canvas');
      tmpC.width = w; tmpC.height = srcH;
      const tmpCtx = tmpC.getContext('2d');
      tmpCtx.drawImage(mainCanvas, 0, srcY, w, srcH, 0, 0, w, srcH);
      const pageData = tmpC.toDataURL('image/jpeg', 0.92);
      doc.addImage(pageData, 'JPEG', 0, 0, imgW, pageImgH);
      y += pageH; remaining -= pageH; pageNum++;
    }
    doc.save('longpage.pdf');
  } catch(e) { alert('PDF导出失败: ' + e.message); }
}

async function exportZipSlices() {
  if (appState.sliceLines.length === 0) {
    alert('请先切换到切图模式并添加切割线！'); return;
  }
  await renderAll();
  const lines = [0, ...appState.sliceLines, mainCanvas.height];
  try {
    const zip = new JSZip();
    for (let i = 0; i < lines.length - 1; i++) {
      const y0 = lines[i], y1 = lines[i+1];
      const sliceH = y1 - y0;
      if (sliceH <= 0) continue;
      const tmpC = document.createElement('canvas');
      tmpC.width = mainCanvas.width; tmpC.height = sliceH;
      const tmpCtx = tmpC.getContext('2d');
      tmpCtx.drawImage(mainCanvas, 0, y0, mainCanvas.width, sliceH, 0, 0, mainCanvas.width, sliceH);
      const dataUrl = tmpC.toDataURL('image/png');
      const b64 = dataUrl.split(',')[1];
      zip.file(`slice_${String(i+1).padStart(2,'0')}.png`, b64, {base64:true});
    }
    const blob = await zip.generateAsync({type:'blob'});
    downloadBlob(blob, 'slices.zip');
  } catch(e) { alert('切片导出失败: ' + e.message); }
}

// ===== 15. INIT =====
async function init() {
  await loadAllFromStorage();
  loadHistoryFromStorage();
  // If no history loaded, create initial snapshot
  if (history.stack.length === 0) historyPush();
  updateHistoryUI();
  moduleYMap = buildModuleYMap();
  // Update toolbar state
  document.getElementById('btn-guides').classList.toggle('active', appState.showGuides);
  // Render
  renderModuleList();
  await renderAll();
  initCanvasInteraction();
  renderSliceOverlay();
  // Canvas scale on window resize
  window.addEventListener('resize', () => { applyCanvasScale(); });
  applyCanvasScale();
  // Ctrl+wheel zoom
  document.getElementById('canvas-area').addEventListener('wheel', function(e) {
    if (!e.ctrlKey) return;
    e.preventDefault();
    setEditorZoom(appState.zoom + (e.deltaY < 0 ? 0.1 : -0.1));
  }, {passive: false});
  setEditorZoom(1); // initialize zoom display
  setView('page'); // Start in page view (three-view system)
  // Preview mode keyboard shortcut and wheel zoom
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const overlay = document.getElementById('preview-overlay');
      if (overlay && !overlay.classList.contains('hidden')) togglePreview();
    }
    if (e.key === 'p' && !e.ctrlKey && !['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) {
      togglePreview();
    }
  });
  const _pvBody = document.getElementById('preview-body');
  if (_pvBody) _pvBody.addEventListener('wheel', function(e) {
    if (!e.ctrlKey) return;
    e.preventDefault();
    previewZoom(e.deltaY < 0 ? 0.1 : -0.1);
  }, {passive: false});
}

init();
